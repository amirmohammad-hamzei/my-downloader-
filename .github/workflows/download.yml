name: ⬇️ Download Manager

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'لینک‌های دانلود (با فاصله جدا کنید)'
        required: true
        type: string
      mode:
        description: 'حالت دانلود'
        required: false
        default: 'single'
        type: choice
        options:
          - single
          - batch
      compression:
        description: 'فشرده‌سازی'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - always
          - never
      password:
        description: 'رمز فایل zip (اختیاری)'
        required: false
        default: ''
        type: string
      split_size:
        description: 'حداکثر حجم هر بخش (MB)'
        required: false
        default: '90'
        type: string

jobs:
  download-files:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 📦 Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 zip unzip curl wget bc

      - name: 📥 Download and Process Files
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          # ═══════════════════════════════
          # Download Manager - All in One
          # ═══════════════════════════════
          
          set -e
          
          # Create directories
          mkdir -p downloads/complete
          mkdir -p downloads/failed
          mkdir -p downloads/logs
          mkdir -p tmp_downloads
          
          # Settings
          SPLIT_MB="${{ github.event.inputs.split_size }}"
          SPLIT_BYTES=$((SPLIT_MB * 1024 * 1024))
          PASSWORD="${{ github.event.inputs.password }}"
          COMPRESSION="${{ github.event.inputs.compression }}"
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          MAX_RETRIES=3
          
          echo "════════════════════════════════════════"
          echo "   🚀 Download Manager"
          echo "════════════════════════════════════════"
          echo "Mode: $MODE | Compression: $COMPRESSION"
          echo "Split: ${SPLIT_MB}MB | Password: $([ -n "$PASSWORD" ] && echo 'YES' || echo 'NO')"
          echo ""
          
          # ═══════════════════
          # Helper Functions
          # ═══════════════════
          
          log_ok() { echo "✅ $1"; echo "✅ $1" >> downloads/logs/session.log; }
          log_err() { echo "❌ $1"; echo "❌ $1" >> downloads/logs/session.log; }
          log_info() { echo "ℹ️  $1"; }
          
          sanitize() {
            echo "$1" | sed 's/[<>:"|?*\\]/_/g' | sed 's/%20/ /g' | sed 's/[?#].*//'
          }
          
          need_compress() {
            local f="$1"
            local mode="$2"
            case "$mode" in
              always) return 0 ;;
              never) return 1 ;;
              auto)
                local ext=$(echo "${f##*.}" | tr '[:upper:]' '[:lower:]')
                case "$ext" in
                  zip|rar|7z|gz|bz2|xz|tar|iso|dmg|exe|msi|mp4|mkv|avi|mp3|jpg|png|pdf) return 1 ;;
                  *) return 0 ;;
                esac ;;
            esac
          }
          
          download_file() {
            local url="$1"
            local output="$2"
            local fname=$(basename "$output")
            
            for try in $(seq 1 $MAX_RETRIES); do
              log_info "Attempt $try/$MAX_RETRIES: $fname"
              
              # Method 1: aria2
              if timeout 600 aria2c -q --split=4 --max-connection-per-server=4 \
                --min-split-size=20M --max-tries=2 --retry-wait=5 \
                --timeout=60 --connect-timeout=30 --check-certificate=true \
                --allow-overwrite=true --auto-file-renaming=false \
                --dir="$(dirname "$output")" --out="$fname" "$url" 2>/dev/null; then
                [ -s "$output" ] && { log_ok "Downloaded: $fname"; return 0; }
              fi
              
              # Method 2: wget
              log_info "Trying wget..."
              if timeout 600 wget -q --show-progress --tries=2 --timeout=60 \
                -U "Mozilla/5.0" -O "$output" "$url" 2>&1; then
                [ -s "$output" ] && { log_ok "Downloaded: $fname"; return 0; }
              fi
              
              # Method 3: curl
              log_info "Trying curl..."
              if timeout 600 curl -L -f -# --retry 2 --retry-delay 5 \
                --connect-timeout 30 --max-time 3600 \
                -A "Mozilla/5.0" -o "$output" "$url" 2>&1; then
                [ -s "$output" ] && { log_ok "Downloaded: $fname"; return 0; }
              fi
              
              [ $try -lt $MAX_RETRIES ] && sleep $((try * 15))
            done
            
            rm -f "$output"
            log_err "Failed: $fname"
            return 1
          }

          # ═══════════════════════════════
          # Function: Split into parts (compatible with all platforms)
          # Creates: .part01.zip, .part02.zip, ... + merge_me.bat + merge_me.sh + README
          # ═══════════════════════════════
          
          split_into_parts() {
            local file_to_split="$1"      # Full path to zip file
            local output_dir="$2"         # Where to create parts
            local base_name="$3"          # Base name for parts
            local split_mb="$4"           # Max size per part in MB
            
            cd "$output_dir"
            
            local original_filename=$(basename "$file_to_split")
            local original_size=$(stat -c%s "$file_to_split" 2>/dev/null || echo 0)
            local original_size_mb=$((original_size / 1024 / 1024))
            
            log_info "Splitting ${original_size_mb}MB file into ${split_mb}MB parts..."
            
            # Use standard split with .partXX naming
            split -b "${split_mb}M" -d "$original_filename" "${base_name}.part"
            
            # Remove the large original
            rm -f "$original_filename"
            
            # Rename parts to .part01.zip, .part02.zip, ...
            local part_num=1
            for part in ${base_name}.part*; do
              local ext_num=$(printf "%02d" $part_num)
              mv "$part" "${base_name}.part${ext_num}.zip"
              part_num=$((part_num + 1))
            done
            
            local total_parts=$((part_num - 1))
            
            # ═══════════════════════════════
            # Create merge script for Windows (.bat)
            # ═══════════════════════════════
            
            cat > "JOIN_PARTS.bat" << BATEOF
          @echo off
          title Join ZIP Parts - ${base_name}
          echo.
          echo ═══════════════════════════════════════
          echo   Joining ${total_parts} parts into ${base_name}.zip
          echo ═══════════════════════════════════════
          echo.
          
          copy /b "${base_name}.part01.zip" + "${base_name}.part02.zip"$(
            for i in $(seq 3 $total_parts); do
              printf " + \"${base_name}.part%02d.zip\"" $i
            done
          ) "${base_name}.zip"
          
          if exist "${base_name}.zip" (
            echo.
            echo ✅ Success! Created: ${base_name}.zip
            echo.
            echo Now extract ${base_name}.zip with 7-Zip or WinRAR
            pause
          ) else (
            echo.
            echo ❌ Failed! Make sure all parts are in this folder
            pause
          )
          BATEOF
            
            # ═══════════════════════════════
            # Create merge script for Linux/Mac (.sh)
            # ═══════════════════════════════
            
            cat > "join_parts.sh" << SHEOF
          #!/bin/bash
          # Join split ZIP parts - ${base_name}
          
          echo "═══════════════════════════════════════"
          echo "  Joining ${total_parts} parts into ${base_name}.zip"
          echo "═══════════════════════════════════════"
          echo ""
          
          cat ${base_name}.part??.zip > "${base_name}.zip"
          
          if [ -f "${base_name}.zip" ]; then
            echo "✅ Success! Created: ${base_name}.zip"
            echo ""
            echo "Now extract with:"
            echo "  unzip ${base_name}.zip"
            [ -n "$PASSWORD" ] && echo "  (password required)"
          else
            echo "❌ Failed! Make sure all parts are in this folder"
          fi
          SHEEOF
            
            chmod +x join_parts.sh
            
            log_ok "Split complete: ${total_parts} parts + merge scripts"
            echo "${total_parts}|${base_name}"
          }

          # ═══════════════════════════════
          # Function: Process single URL
          # ═══════════════════════════════

          process_file() {
            local url="$1"
            
            # Get filename from URL
            local original_name=$(basename "$url" | sed 's/%20/ /g' | sed 's/[?#].*//')
            local safe_name=$(sanitize "$original_name")
            local temp_file="tmp_downloads/${safe_name}"
            local base_name="${safe_name%.*}"
            local output_dir="downloads/complete/${base_name}"
            
            echo "────────────────────────────────────────"
            log_info "URL: $url"
            log_info "File: $safe_name"
            
            # Download
            if ! download_file "$url" "$temp_file"; then
              # Create error report
              local err_dir="downloads/failed/${base_name}_$(date +%s)"
              mkdir -p "$err_dir"
              cat > "$err_dir/README.md" << EOF
          # ❌ Download Failed
          
          | Info | Value |
          |------|-------|
          | File | $safe_name |
          | URL | $url |
          | Date | $(date) |
          
          ## Possible Fixes
          1. Check URL in browser
          2. Try again later
          3. Some servers block bots
          EOF
              return 1
            fi
            
            # Get size
            local size=$(stat -c%s "$temp_file" 2>/dev/null || echo 0)
            local size_mb=$((size / 1024 / 1024))
            
            # Create output directory
            mkdir -p "$output_dir"
            
            # Move file to output directory for processing
            local working_file="$output_dir/${safe_name}"
            mv "$temp_file" "$working_file"
            
            # ═══════════════════
            # Step 1: Decide compression
            # ═══════════════════
            
            local current_file="$safe_name"
            local current_path="$output_dir/$current_file"
            local is_zipped=false
            
            cd "$output_dir"
            
            if need_compress "$safe_name" "$COMPRESSION"; then
              # Compress to ZIP
              log_info "Compressing to ZIP (${size_mb}MB)..."
              
              local zip_name="${safe_name}.zip"
              
              if [ -n "$PASSWORD" ]; then
                zip -j -P "$PASSWORD" "$zip_name" "$current_file" -q 2>/dev/null
              else
                zip -j "$zip_name" "$current_file" -q 2>/dev/null
              fi
              
              rm -f "$current_file"
              current_file="$zip_name"
              current_path="$output_dir/$current_file"
              is_zipped=true
              
              local new_size=$(stat -c%s "$current_path" 2>/dev/null || echo 0)
              log_ok "Compressed: $current_file ($(($new_size / 1024 / 1024))MB)"
            else
              log_ok "Saved without compression (${size_mb}MB)"
            fi
            
            cd - > /dev/null
            
            # Get final size
            local final_size=$(stat -c%s "$output_dir/$current_file" 2>/dev/null || echo 0)
            local final_size_mb=$((final_size / 1024 / 1024))
            
            # ═══════════════════
            # Step 2: Check if needs splitting
            # ═══════════════════
            
            if [ "$final_size" -gt "$SPLIT_BYTES" ]; then
              log_info "File is ${final_size_mb}MB - splitting into ${SPLIT_MB}MB parts..."
              
              # If not already a ZIP, wrap it first
              if [ "$is_zipped" = false ]; then
                log_info "Wrapping in ZIP before splitting..."
                
                cd "$output_dir"
                
                local wrap_zip="${safe_name}.zip"
                
                if [ -n "$PASSWORD" ]; then
                  zip -j -P "$PASSWORD" "$wrap_zip" "$current_file" -q 2>/dev/null
                else
                  zip -j "$wrap_zip" "$current_file" -q 2>/dev/null
                fi
                
                rm -f "$current_file"
                current_file="$wrap_zip"
                current_path="$output_dir/$current_file"
                
                cd - > /dev/null
                
                log_ok "Wrapped in ZIP: $wrap_zip"
              fi
              
              # Split into parts
              local split_info=$(split_into_parts "$current_path" "$output_dir" "$base_name" "$SPLIT_MB")
              local part_count=$(echo "$split_info" | cut -d'|' -f1)
              local split_base=$(echo "$split_info" | cut -d'|' -f2)
              
              # ═══════════════════
              # Create README with mobile instructions
              # ═══════════════════
              
              cat > "$output_dir/README.md" << EOF
          # 📦 Split ZIP: $safe_name
          
          > ⚠️ Split into ${part_count} parts (total: ${final_size_mb}MB)
          > 📱 **Works on ALL devices**: Windows, Mac, Linux, Android, iOS
          
          | Info | Value |
          |------|-------|
          | Original | $safe_name |
          | Total Size | ${final_size_mb} MB |
          | Parts | ${part_count} |
          | Password | $([ -n "$PASSWORD" ] && echo "YES 🔐" || echo "NO") |
          
          ## 📁 Files in this folder
          EOF
              
              # List all parts
              for part in "$output_dir"/${split_base}.part*.zip; do
                [ -f "$part" ] || continue
                local pname=$(basename "$part")
                local psize=$(ls -lh "$part" 2>/dev/null | awk '{print $5}')
                echo "- \`$pname\` ($psize)" >> "$output_dir/README.md"
              done
              
              echo "- \`JOIN_PARTS.bat\` (Windows merge script)" >> "$output_dir/README.md"
              echo "- \`join_parts.sh\` (Mac/Linux merge script)" >> "$output_dir/README.md"
              
              cat >> "$output_dir/README.md" << 'EOF'
          
          ---
          
          ## 🖥️ Windows
          ### روش ۱ (آسان)
          ۱. همه فایل‌ها را در یک پوشه بریزید
          ۲. روی **`JOIN_PARTS.bat`** دابل‌کلیک کنید
          ۳. فایل ZIP نهایی ساخته می‌شود → با 7-Zip یا WinRAR استخراج کنید
          
          ### روش ۲ (دستی)
          ```cmd
          copy /b *.part*.zip combined.zip
          ```
          
          ## 🐧 Linux / 🍎 Mac
          ### روش ۱ (آسان)
          ```bash
          chmod +x join_parts.sh
          ./join_parts.sh
          ```
          
          ### روش ۲ (دستی)
          ```bash
          cat *.part*.zip > combined.zip
          unzip combined.zip
          ```
          
          ## 📱 Android
          ### استفاده از اپلیکیشن (پیشنهادی)
          ۱. همه فایل‌های `.part*.zip` را دانلود کنید
          ۲. اپلیکیشن **[File Joiner](https://play.google.com/store/search?q=file+joiner&c=apps)** یا **[Split File Joiner](https://play.google.com/store/search?q=split+file+joiner&c=apps)** را نصب کنید
          ۳. با اپ فایل‌ها را Join کنید
          ۴. سپس با **ZArchiver** یا **RAR** استخراج کنید
          
          ### استفاده از Termux (پیشرفته)
          ```bash
          pkg install zip unzip
          cat *.part*.zip > combined.zip
          unzip combined.zip
          ```
          
          ## 📱 iOS (iPhone/iPad)
          ۱. همه فایل‌ها را در **Files app** دانلود کنید (در یک پوشه)
          ۲. اپلیکیشن **[Zip & RAR File Extractor](https://apps.apple.com/us/app/zip-rar-file-extractor/id123456)** یا **iZip** را نصب کنید
          ۳. در اپ، گزینه **Merge/Join files** را پیدا کنید
          ۴. یا فایل‌ها را به کامپیوتر منتقل کرده و با روش ویندوز/مک join کنید
          
          ---
          
          ## ⚠️ نکات مهم
          - ✅ **همه فایل‌ها باید در یک پوشه باشند**
          - ✅ فایل‌ها را **rename نکنید**
          - ✅ ترتیب فایل‌ها مهم است: `part01`, `part02`, ...
          - ✅ بعد از join، فایل `combined.zip` را با هر برنامه ZIP باز کنید
          EOF
              
              if [ -n "$PASSWORD" ]; then
                echo "" >> "$output_dir/README.md"
                echo "> 🔐 **پسورد:** همان رمزی که موقع دانلود تنظیم کردید" >> "$output_dir/README.md"
              fi
              
              log_ok "Split complete: ${part_count} parts"
              
            else
              # ═══════════════════
              # No split needed - simple README
              # ═══════════════════
              
              cat > "$output_dir/README.md" << EOF
          # 📦 File: $safe_name
          
          | Info | Value |
          |------|-------|
          | File | $current_file |
          | Size | ${final_size_mb} MB |
          | Type | $([ "$is_zipped" = true ] && echo "ZIP Archive" || echo "Original File") |
          | Password | $([ -n "$PASSWORD" ] && echo "YES 🔐" || echo "NO") |
          
          ## 📱 How to Extract
          
          ### 🖥️ Windows
          - Right-click → **7-Zip** → Extract Here
          - Or use **WinRAR**
          
          ### 🍎 Mac
          - Double-click to extract
          
          ### 🐧 Linux
          ```bash
          unzip $current_file
          ```
          
          ### 📱 Android
          - Use **ZArchiver** or **RAR** app
          
          ### 📱 iOS
          - Use **iZip** or **Unzip** app
          $([ -n "$PASSWORD" ] && echo "\n> 🔐 **Password:** The one you set when downloading" || echo "")
          EOF
              
              log_ok "File is ${final_size_mb}MB - no split needed"
            fi
            
            log_ok "Done: $safe_name"
            echo "$output_dir"
            return 0
          }
          
          # ═══════════════════
          # Process Each URL
          # ═══════════════════
          
          success=0
          fail=0
          all_output_dirs=""
          
          for url in $URLS; do
            result_dir=$(process_file "$url")
            
            if [ $? -eq 0 ]; then
              success=$((success + 1))
              all_output_dirs="$all_output_dirs $result_dir"
            else
              fail=$((fail + 1))
            fi
            
            echo ""
          done
          
          # ═══════════════════
          # Batch Mode
          # ═══════════════════
          
          if [ "$MODE" = "batch" ] && [ $success -gt 1 ]; then
            echo "────────────────────────────────────────"
            log_info "Creating batch archive..."
            
            batch_name="batch_$(date +%Y%m%d_%H%M%S)"
            batch_dir="downloads/complete/$batch_name"
            mkdir -p "$batch_dir"
            
            # Move all files to batch directory
            for dir in $all_output_dirs; do
              [ ! -d "$dir" ] && continue
              find "$dir" -type f -exec mv {} "$batch_dir/" \; 2>/dev/null
              rm -rf "$dir" 2>/dev/null
            done
            
            log_ok "Batch created: $batch_name"
          fi
          
          # Cleanup temp
          rm -rf tmp_downloads
          
          # ═══════════════════
          # Final Summary
          # ═══════════════════
          
          echo ""
          echo "════════════════════════════════════════"
          echo "   ✅ Success: $success  |  ❌ Failed: $fail"
          echo "════════════════════════════════════════"
          
          # List files
          echo ""
          echo "📁 Downloaded files:"
          find downloads/complete -type f ! -name "README.md" ! -name "*.bat" ! -name "*.sh" -exec ls -lh {} \; 2>/dev/null || echo "  (none)"
          
          if [ $fail -gt 0 ]; then
            echo ""
            echo "⚠️  Failed downloads in: downloads/failed/"
          fi

      - name: 📊 Create Report in downloads folder
        if: always()
        run: |
          echo "📊 Creating report in downloads/ folder..."
          
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          
          # Create report
          cat > downloads/README.md << 'EOF'
          # 📥 فایل‌های دانلود شده
          
          > آخرین به‌روزرسانی: 
          EOF
          
          echo "> $(date '+%Y-%m-%d %H:%M:%S')" >> downloads/README.md
          echo "> 📱 **قابل استفاده روی همه دستگاه‌ها**" >> downloads/README.md
          echo "" >> downloads/README.md
          echo "---" >> downloads/README.md
          
          # Successful downloads
          if [ -d "downloads/complete" ] && [ "$(ls -A downloads/complete 2>/dev/null)" ]; then
            echo "" >> downloads/README.md
            echo "## ✅ دانلودهای موفق" >> downloads/README.md
            echo "" >> downloads/README.md
            echo "| 📁 پوشه | 📏 حجم | 📦 فایل‌ها | 🔗 لینک |" >> downloads/README.md
            echo "|---------|-------|-----------|--------|" >> downloads/README.md
            
            for dir in downloads/complete/*/; do
              [ -d "$dir" ] || continue
              dname=$(basename "$dir")
              dsize=$(du -sh "$dir" 2>/dev/null | cut -f1)
              fcount=$(find "$dir" -type f ! -name "README.md" ! -name "*.bat" ! -name "*.sh" 2>/dev/null | wc -l)
              denc=$(echo "$dname" | sed 's/ /%20/g')
              dlink="${REPO_URL}/tree/${BRANCH}/downloads/complete/${denc}"
              
              echo "| [${dname}](${dlink}) | ${dsize} | ${fcount} | [📂 باز کردن](${dlink}) |" >> downloads/README.md
            done
          else
            echo "" >> downloads/README.md
            echo "_هنوز فایلی دانلود نشده_" >> downloads/README.md
          fi
          
          # Failed downloads
          if [ -d "downloads/failed" ] && [ "$(ls -A downloads/failed 2>/dev/null)" ]; then
            echo "" >> downloads/README.md
            echo "## ❌ دانلودهای ناموفق" >> downloads/README.md
            echo "" >> downloads/README.md
            for dir in downloads/failed/*/; do
              [ -d "$dir" ] || continue
              dname=$(basename "$dir")
              denc=$(echo "$dname" | sed 's/ /%20/g')
              dlink="${REPO_URL}/tree/${BRANCH}/downloads/failed/${denc}"
              echo "- [${dname}](${dlink})" >> downloads/README.md
            done
          fi
          
          # Help section
          cat >> downloads/README.md << 'EOF'
          
          ---
          
          ### 📱 راهنمای استخراج فایل‌های چندبخشی
          
          فایل‌های split شده با پسوند `.part01.zip`، `.part02.zip` و...:
          
          | سیستم‌عامل | روش Join کردن |
          |-----------|------------|
          | **Windows** | روی `JOIN_PARTS.bat` دابل‌کلیک کنید |
          | **Mac/Linux** | `chmod +x join_parts.sh && ./join_parts.sh` |
          | **Android** | اپلیکیشن File Joiner + ZArchiver |
          | **iOS** | به کامپیوتر منتقل کنید یا از اپ Zip Extractor استفاده کنید |
          
          **⚠️ نکته مهم:** همه فایل‌ها باید در **یک پوشه** باشند!
          EOF
          
          echo "✅ Report created in downloads/README.md"

      - name: 💾 Commit and Push
        if: always()
        run: |
          echo "💾 Saving files to repository..."
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage only downloads folder
          git add downloads/ 2>/dev/null || true
          
          # Check if there's anything to commit
          if git diff --cached --quiet 2>/dev/null; then
            echo "No changes to commit"
            exit 0
          fi
          
          # Commit with descriptive message
          success_count=$(find downloads/complete -type f ! -name "README.md" ! -name "*.bat" ! -name "*.sh" 2>/dev/null | wc -l)
          fail_count=$(find downloads/failed -mindepth 1 -type d 2>/dev/null | wc -l)
          
          commit_msg="📥 Download: ${success_count} files"
          [ "$fail_count" -gt 0 ] && commit_msg="${commit_msg}, ${fail_count} failed"
          commit_msg="${commit_msg} [skip ci]"
          
          git commit -m "$commit_msg" || echo "Nothing to commit"
          
          # Push with retry
          for i in 1 2 3; do
            git pull --rebase origin "${{ github.ref_name }}" 2>/dev/null && break
            sleep 5
          done
          
          git push origin HEAD:"${{ github.ref_name }}" || echo "Push failed, will retry..."
          
          echo "✅ Files saved to repository"

      - name: 🎉 Done
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════════"
          echo "   🎉 Session Complete!"
          echo "════════════════════════════════════════"
          echo ""
          echo "📁 All files saved in: downloads/"
          echo "📊 Full report: downloads/README.md"
          echo ""
          echo "📱 Compatible with:"
          echo "   🖥️  Windows  (run JOIN_PARTS.bat)"
          echo "   🍎 Mac      (run join_parts.sh)"
          echo "   🐧 Linux    (run join_parts.sh)"
          echo "   📱 Android  (File Joiner app)"
          echo "   📱 iOS      (transfer to computer)"
