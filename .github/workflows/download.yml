name: ⬇️ Download Manager v4

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'لینک های دانلود (هر خط یک لینک)'
        required: true
        type: string
      password:
        description: 'رمز فایل ZIP (اختیاری - خالی بذارید بدون رمز باشه)'
        required: false
        default: ''
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Main Process
        env:
          URLS: ${{ github.event.inputs.urls }}
          PASSWORD: ${{ github.event.inputs.password }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq aria2 zip unzip
          
          # Create unique folder for this batch with timestamp
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          BATCH_FOLDER="download_${TIMESTAMP}"
          
          # Create base downloads folder if not exists
          mkdir -p downloads
          
          # Create this batch's folder
          mkdir -p "downloads/${BATCH_FOLDER}"
          cd "downloads/${BATCH_FOLDER}"
          
          PROCESS_LOG="../process_${TIMESTAMP}.log"
          echo "Download started: $(date)" > "$PROCESS_LOG"
          echo "Batch: ${BATCH_FOLDER}" >> "$PROCESS_LOG"
          
          count=0
          echo "$URLS" | while IFS= read -r url; do
            [ -z "$url" ] && continue
            count=$((count + 1))
            
            # Get clean filename
            filename=$(basename "$url" | cut -d'?' -f1 | cut -d'#' -f1 | sed 's/%20/_/g')
            [ -z "$filename" ] && filename="download_${count}.bin"
            
            base="${filename%.*}"
            ext="${filename##*.}"
            
            echo "=========================================" | tee -a "$PROCESS_LOG"
            echo "[$count] Processing: $filename" | tee -a "$PROCESS_LOG"
            echo "URL: $url" >> "$PROCESS_LOG"
            
            # Step 1: Download
            echo "⏳ Downloading..." | tee -a "$PROCESS_LOG"
            DOWNLOAD_SUCCESS=false
            
            aria2c -q -x4 -s4 --max-tries=5 --timeout=120 \
              --dir=. --out="$filename" "$url" 2>/dev/null && [ -s "$filename" ] && DOWNLOAD_SUCCESS=true
            
            if [ "$DOWNLOAD_SUCCESS" = false ]; then
              wget -q --tries=5 --timeout=60 -U "Mozilla/5.0" -O "$filename" "$url" 2>/dev/null && [ -s "$filename" ] && DOWNLOAD_SUCCESS=true
            fi
            
            if [ "$DOWNLOAD_SUCCESS" = false ]; then
              curl -L -s --retry 5 --connect-timeout 30 -A "Mozilla/5.0" -o "$filename" "$url" && [ -s "$filename" ] && DOWNLOAD_SUCCESS=true
            fi
            
            if [ "$DOWNLOAD_SUCCESS" = false ] || [ ! -s "$filename" ]; then
              echo "❌ FAILED: Could not download $filename" | tee -a "$PROCESS_LOG"
              rm -f "$filename"
              continue
            fi
            
            size=$(stat -c%s "$filename")
            echo "✅ Downloaded: $((size / 1024 / 1024)) MB" | tee -a "$PROCESS_LOG"
            
            # Step 2: Smart ZIP - Only if > 90MB
            if [ "$size" -gt 94371840 ]; then
              echo "📦 File > 90MB, creating ZIP..." | tee -a "$PROCESS_LOG"
              ZIP_NAME="${base}.zip"
              
              if [ "$ext" = "zip" ] || [ "$ext" = "ZIP" ]; then
                if [ "$filename" != "$ZIP_NAME" ]; then
                  mv "$filename" "$ZIP_NAME"
                  filename="$ZIP_NAME"
                fi
                echo "   File is already a ZIP" | tee -a "$PROCESS_LOG"
              else
                if [ -n "$PASSWORD" ]; then
                  zip -P "$PASSWORD" "$ZIP_NAME" "$filename" 2>/dev/null
                else
                  zip "$ZIP_NAME" "$filename" 2>/dev/null
                fi
                
                if [ -s "$ZIP_NAME" ]; then
                  rm "$filename"
                  filename="$ZIP_NAME"
                  size=$(stat -c%s "$filename")
                  echo "   ZIP created: $((size / 1024 / 1024)) MB" | tee -a "$PROCESS_LOG"
                else
                  mv "$ZIP_NAME" "$filename" 2>/dev/null
                  echo "   ZIP failed, keeping original" | tee -a "$PROCESS_LOG"
                fi
              fi
              
              # Step 3: Split the ZIP
              echo "✂️  Splitting into 90MB parts..." | tee -a "$PROCESS_LOG"
              
              PARTS_DIR="${base}_parts"
              mkdir -p "$PARTS_DIR"
              
              mv "$filename" "$PARTS_DIR/"
              cd "$PARTS_DIR"
              
              split -b 90M -d "$filename" "part_"
              
              if [ $? -eq 0 ]; then
                rm "$filename"
                
                n=1
                for part in part_*; do
                  new_name=$(printf "${base}.zip.%03d" $n)
                  mv "$part" "$new_name"
                  echo "   - $new_name ($(ls -lh "$new_name" | awk '{print $5}'))" >> "$PROCESS_LOG"
                  n=$((n + 1))
                done
                total=$((n - 1))
                
                echo "   Split into ${total} parts" | tee -a "$PROCESS_LOG"
                
                # Join Scripts
                echo "#!/bin/bash" > join.sh
                echo "cat ${base}.zip.* > ../${base}.zip" >> join.sh
                echo "echo 'Joined: ${base}.zip'" >> join.sh
                chmod +x join.sh
                
                echo "@echo off" > join.bat
                echo "copy /b ${base}.zip.* ..\\${base}.zip" >> join.bat
                echo "echo Joined: ${base}.zip" >> join.bat
                
                # README
                echo "# 📦 Split ZIP Archive" > README.md
                echo "" >> README.md
                echo "**Original File:** ${base}.zip" >> README.md
                echo "**Parts:** ${total}" >> README.md
                if [ -n "$PASSWORD" ]; then
                  echo "**Password:** Yes" >> README.md
                fi
                echo "" >> README.md
                echo "## 🔧 How to Join & Extract" >> README.md
                echo "" >> README.md
                echo "### 🖥️ Windows" >> README.md
                echo "1. Run \`join.bat\`" >> README.md
                echo "2. Extract \`${base}.zip\` with 7-Zip or WinRAR" >> README.md
                echo "" >> README.md
                echo "### 🍎 Mac / 🐧 Linux" >> README.md
                echo "\`\`\`bash" >> README.md
                echo "bash join.sh" >> README.md
                if [ -n "$PASSWORD" ]; then
                  echo "unzip -P 'YOUR_PASSWORD' ${base}.zip" >> README.md
                else
                  echo "unzip ${base}.zip" >> README.md
                fi
                echo "\`\`\`" >> README.md
                echo "" >> README.md
                echo "### 📱 Android (Termux)" >> README.md
                echo "\`\`\`bash" >> README.md
                echo "cat ${base}.zip.* > ${base}.zip" >> README.md
                echo "# Then open with ZArchiver" >> README.md
                echo "\`\`\`" >> README.md
              else
                echo "❌ Split failed" | tee -a "$PROCESS_LOG"
                mv "$filename" ../
              fi
              
              cd ..
            else
              # File <= 90MB: keep original, no ZIP
              echo "📄 File <= 90MB, keeping original format" | tee -a "$PROCESS_LOG"
            fi
            
            echo "✅ Completed: $filename" | tee -a "$PROCESS_LOG"
            echo "" >> "$PROCESS_LOG"
          done
          
          # Batch README
          echo "# 📥 Download Batch: ${TIMESTAMP}" > README.md
          echo "" >> README.md
          echo "**Date:** $(date)" >> README.md
          echo "**Password:** $([ -n "$PASSWORD" ] && echo 'Yes' || echo 'No')" >> README.md
          echo "" >> README.md
          echo "## 📁 Files in this batch" >> README.md
          echo "" >> README.md
          find . -type f -not -name "README.md" -not -name "join.sh" -not -name "join.bat" -exec ls -lh {} \; >> README.md 2>/dev/null
          
          # Main downloads README (update with all batches)
          cd ../..
          echo "# 📥 All Downloads" > downloads/README.md
          echo "" >> downloads/README.md
          echo "**Last update:** $(date)" >> downloads/README.md
          echo "" >> downloads/README.md
          echo "## 📂 Download Batches" >> downloads/README.md
          echo "" >> downloads/README.md
          for folder in downloads/download_*; do
            if [ -d "$folder" ]; then
              folder_name=$(basename "$folder")
              file_count=$(find "$folder" -type f -not -name "README.md" | wc -l)
              echo "- **[$folder_name]($folder_name/)** - $file_count files" >> downloads/README.md
            fi
          done
          
          cd ..

      - name: Finalize & Push
        if: always()
        run: |
          echo "Saving to GitHub..."
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add downloads/
          
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          
          git commit -m "📥 Download batch $(date +%Y-%m-%d_%H-%M-%S) [skip ci]"
          
          echo "Pushing..."
          git pull --rebase origin ${{ github.ref_name }} 2>/dev/null || true
          git push origin HEAD:${{ github.ref_name }}
          
          echo ""
          echo "=============================="
          echo " ✅ DONE!"
          echo "=============================="
          echo "📁 Your files:"
          echo "${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}/downloads"

      - name: Show Results
        run: |
          echo ""
          echo "=============================="
          echo " 📥 DOWNLOAD LINKS"
          echo "=============================="
          echo ""
          echo "🔗 Main folder:"
          echo "${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}/downloads"
          echo ""
          echo "📂 Latest batch:"
          LATEST=$(ls -td downloads/download_* 2>/dev/null | head -1)
          if [ -n "$LATEST" ]; then
            echo "${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}/${LATEST}"
            echo ""
            echo "📁 Contents:"
            find "$LATEST" -type f -not -name "README.md" -not -name "join.sh" -not -name "join.bat" -exec ls -lh {} \;
          fi
