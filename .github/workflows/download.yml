name: ⬇️ Download Manager

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'لینک‌های دانلود (با فاصله جدا کنید)'
        required: true
        type: string
      mode:
        description: 'حالت دانلود'
        required: false
        default: 'single'
        type: choice
        options:
          - single
          - batch
      compression:
        description: 'فشرده‌سازی'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - always
          - never
      password:
        description: 'رمز فایل zip (اختیاری)'
        required: false
        default: ''
        type: string
      split_size:
        description: 'حداکثر حجم هر بخش (MB)'
        required: false
        default: '90'
        type: string

jobs:
  download-files:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 📦 Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 zip unzip curl wget bc p7zip-full p7zip-rar

      - name: 📥 Download and Process Files
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          set -e
          
          mkdir -p downloads/complete
          mkdir -p downloads/failed
          mkdir -p downloads/logs
          mkdir -p tmp_downloads
          
          SPLIT_MB="${{ github.event.inputs.split_size }}"
          SPLIT_BYTES=$((SPLIT_MB * 1024 * 1024))
          PASSWORD="${{ github.event.inputs.password }}"
          COMPRESSION="${{ github.event.inputs.compression }}"
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          MAX_RETRIES=3
          
          echo "════════════════════════════════════════"
          echo "   🚀 Download Manager"
          echo "════════════════════════════════════════"
          echo "Mode: $MODE | Compression: $COMPRESSION"
          echo "Split: ${SPLIT_MB}MB | Password: $([ -n "$PASSWORD" ] && echo 'YES' || echo 'NO')"
          echo "Format: 7z Multi-Volume (open directly!)"
          echo ""
          
          log_ok() { echo "✅ $1"; echo "✅ $1" >> downloads/logs/session.log; }
          log_err() { echo "❌ $1"; echo "❌ $1" >> downloads/logs/session.log; }
          log_info() { echo "ℹ️  $1"; }
          
          sanitize() {
            echo "$1" | sed 's/[<>:"|?*\\]/_/g' | sed 's/%20/ /g' | sed 's/[?#].*//'
          }
          
          need_compress() {
            local f="$1"
            local mode="$2"
            case "$mode" in
              always) return 0 ;;
              never) return 1 ;;
              auto)
                local ext=$(echo "${f##*.}" | tr '[:upper:]' '[:lower:]')
                case "$ext" in
                  zip|rar|7z|gz|bz2|xz|tar|iso|dmg|exe|msi|mp4|mkv|avi|mp3|jpg|png|pdf) return 1 ;;
                  *) return 0 ;;
                esac ;;
            esac
          }
          
          download_file() {
            local url="$1"
            local output="$2"
            local fname=$(basename "$output")
            
            for try in $(seq 1 $MAX_RETRIES); do
              log_info "Attempt $try/$MAX_RETRIES: $fname"
              
              if timeout 600 aria2c -q --split=4 --max-connection-per-server=4 \
                --min-split-size=20M --max-tries=2 --retry-wait=5 \
                --timeout=60 --connect-timeout=30 --check-certificate=true \
                --allow-overwrite=true --auto-file-renaming=false \
                --dir="$(dirname "$output")" --out="$fname" "$url" 2>/dev/null; then
                [ -s "$output" ] && { log_ok "Downloaded: $fname"; return 0; }
              fi
              
              if timeout 600 wget -q --show-progress --tries=2 --timeout=60 \
                -U "Mozilla/5.0" -O "$output" "$url" 2>&1; then
                [ -s "$output" ] && { log_ok "Downloaded: $fname"; return 0; }
              fi
              
              if timeout 600 curl -L -f -# --retry 2 --retry-delay 5 \
                --connect-timeout 30 --max-time 3600 \
                -A "Mozilla/5.0" -o "$output" "$url" 2>&1; then
                [ -s "$output" ] && { log_ok "Downloaded: $fname"; return 0; }
              fi
              
              [ $try -lt $MAX_RETRIES ] && sleep $((try * 15))
            done
            
            rm -f "$output"
            log_err "Failed: $fname"
            return 1
          }

          # ═══════════════════════════════
          # Process single URL
          # ═══════════════════════════════

          process_file() {
            local url="$1"
            
            local original_name=$(basename "$url" | sed 's/%20/ /g' | sed 's/[?#].*//')
            local safe_name=$(sanitize "$original_name")
            local temp_file="tmp_downloads/${safe_name}"
            local base_name="${safe_name%.*}"
            local output_dir="downloads/complete/${base_name}"
            
            echo "────────────────────────────────────────"
            log_info "URL: $url"
            log_info "File: $safe_name"
            
            # Download
            if ! download_file "$url" "$temp_file"; then
              local err_dir="downloads/failed/${base_name}_$(date +%s)"
              mkdir -p "$err_dir"
              printf "# ❌ Download Failed\n\n| Info | Value |\n|------|-------|\n| File | %s |\n| URL | %s |\n| Date | %s |\n\n## Possible Fixes\n1. Check URL\n2. Try again later\n3. Server may block bots\n" "$safe_name" "$url" "$(date)" > "$err_dir/README.md"
              return 1
            fi
            
            local size=$(stat -c%s "$temp_file" 2>/dev/null || echo 0)
            local size_mb=$((size / 1024 / 1024))
            
            mkdir -p "$output_dir"
            
            # Move file
            mv "$temp_file" "$output_dir/$safe_name"
            cd "$output_dir"
            
            local current_file="$safe_name"
            
            # ═══════════════════
            # Decide: compress or not
            # ═══════════════════
            
            if need_compress "$safe_name" "$COMPRESSION"; then
              log_info "Creating ZIP (${size_mb}MB)..."
              
              local zip_name="${safe_name}.zip"
              
              if [ -n "$PASSWORD" ]; then
                7z a -tzip -p"$PASSWORD" -mhe=on "$zip_name" "$current_file" > /dev/null 2>&1
              else
                7z a -tzip "$zip_name" "$current_file" > /dev/null 2>&1
              fi
              
              rm -f "$current_file"
              current_file="$zip_name"
              
              local new_size=$(stat -c%s "$current_file" 2>/dev/null || echo 0)
              log_ok "Created: $current_file ($(($new_size / 1024 / 1024))MB)"
            else
              log_ok "Saved: $current_file (${size_mb}MB)"
              
              # If huge file and not zipped, wrap in store-only ZIP
              if [ "$size" -gt "$SPLIT_BYTES" ]; then
                log_info "Wrapping in ZIP for splitting..."
                
                local wrap_zip="${base_name}.zip"
                
                if [ -n "$PASSWORD" ]; then
                  7z a -tzip -mx=0 -p"$PASSWORD" -mhe=on "$wrap_zip" "$current_file" > /dev/null 2>&1
                else
                  7z a -tzip -mx=0 "$wrap_zip" "$current_file" > /dev/null 2>&1
                fi
                
                rm -f "$current_file"
                current_file="$wrap_zip"
                log_ok "Wrapped: $wrap_zip"
              fi
            fi
            
            local final_size=$(stat -c%s "$current_file" 2>/dev/null || echo 0)
            local final_size_mb=$((final_size / 1024 / 1024))
            
            # ═══════════════════
            # Split if needed (7z multi-volume)
            # ═══════════════════
            
            if [ "$final_size" -gt "$SPLIT_BYTES" ]; then
              log_info "Splitting ${final_size_mb}MB into ${SPLIT_MB}MB parts..."
              
              local archive_name="$current_file"
              
              # Split using 7z: creates file.zip.001, file.zip.002, ...
              # IMPORTANT: -v switch for volume size
              if [ -n "$PASSWORD" ]; then
                # Re-create with volume split
                local temp_extract="temp_extract_$$"
                mkdir "$temp_extract"
                cp "$archive_name" "$temp_extract/"
                cd "$temp_extract"
                unzip -P "$PASSWORD" "$archive_name" > /dev/null 2>&1 || true
                rm -f "$archive_name"
                
                # Find the extracted file
                local extracted=$(ls | head -1)
                
                # Create multi-volume 7z (zip format)
                7z a -tzip -v${SPLIT_MB}m -p"$PASSWORD" -mhe=on "../${base_name}.zip" "$extracted" > /dev/null 2>&1
                
                cd ..
                rm -rf "$temp_extract" "$archive_name"
              else
                # Check if it's a zip we can re-split
                local temp_extract="temp_extract_$$"
                mkdir "$temp_extract"
                cp "$archive_name" "$temp_extract/"
                cd "$temp_extract"
                
                # Try to extract
                if unzip -o "$archive_name" > /dev/null 2>&1; then
                  rm -f "$archive_name"
                  local extracted=$(ls | head -1)
                  7z a -tzip -v${SPLIT_MB}m "../${base_name}.zip" "$extracted" > /dev/null 2>&1
                else
                  # Can't extract, split the zip as-is
                  7z a -tzip -v${SPLIT_MB}m "../${base_name}.zip" "$archive_name" > /dev/null 2>&1
                fi
                
                cd ..
                rm -rf "$temp_extract" "$archive_name"
              fi
              
              # Count parts
              local part_count=$(ls -1 ${base_name}.zip.* 2>/dev/null | wc -l)
              
              # Rename: file.zip.001 → file.zip.001, etc (already correct)
              # 7z creates file.zip.001, file.zip.002, ...
              
              log_ok "Split into ${part_count} parts (open .zip.001 directly!)"
              
              # Create README
              {
                echo "# 📦 Multi-Volume ZIP: $safe_name"
                echo ""
                echo "> ✨ **NO JOINING NEEDED!** Open \`.zip.001\` directly!"
                echo "> Total: ${final_size_mb}MB → ${part_count} parts"
                echo ""
                echo "| Info | Value |"
                echo "|------|-------|"
                echo "| Original | $safe_name |"
                echo "| Total Size | ${final_size_mb} MB |"
                echo "| Parts | ${part_count} |"
                echo "| Password | $([ -n "$PASSWORD" ] && echo "YES 🔐" || echo "NO") |"
                echo ""
                echo "## 📁 Parts"
                
                for part in ${base_name}.zip.*; do
                  [ -f "$part" ] || continue
                  local psize=$(ls -lh "$part" 2>/dev/null | awk '{print $5}')
                  echo "- \`$part\` ($psize)"
                done
                
                echo ""
                echo "## 🎯 How to Open (NO JOINING!)"
                echo ""
                echo "| Platform | Action |"
                echo "|----------|--------|"
                echo "| **📱 Android** | Open \`.zip.001\` with **ZArchiver** |"
                echo "| **📱 iOS** | Open with **iZip** or **Unzip** |"
                echo "| **🖥️ Windows** | Right-click \`.zip.001\` → **7-Zip** → Extract |"
                echo "| **🖥️ WinRAR** | Open \`.zip.001\` directly |"
                echo "| **🍎 Mac** | Double-click \`.zip.001\` (**The Unarchiver**) |"
                echo "| **🐧 Linux** | \`7z x ${base_name}.zip.001\` |"
                echo ""
                echo "## ⚠️ Remember"
                echo "- ✅ Download ALL parts to the SAME folder"
                echo "- ✅ Open the **FIRST part** (\`.zip.001\`)"
                echo "- ✅ The program AUTOMATICALLY reads all parts"
                echo "- ❌ Do NOT rename files"
                echo "- ❌ No need to \"join\" or \"merge\" anything!"
                
                if [ -n "$PASSWORD" ]; then
                  echo ""
                  echo "> 🔐 **Password:** The one you set when downloading"
                fi
              } > "README.md"
              
            else
              # No split needed
              {
                echo "# 📦 File: $safe_name"
                echo ""
                echo "| Info | Value |"
                echo "|------|-------|"
                echo "| File | $current_file |"
                echo "| Size | ${final_size_mb} MB |"
                echo "| Password | $([ -n "$PASSWORD" ] && echo "YES 🔐" || echo "NO") |"
                echo ""
                echo "## 📱 Extract on..."
                echo ""
                echo "| Platform | App |"
                echo "|----------|-----|"
                echo "| Android | ZArchiver |"
                echo "| iOS | iZip |"
                echo "| Windows | 7-Zip / WinRAR |"
                echo "| Mac | Double-click |"
                echo "| Linux | unzip / 7z |"
                
                if [ -n "$PASSWORD" ]; then
                  echo ""
                  echo "> 🔐 **Password:** The one you set"
                fi
              } > "README.md"
              
              log_ok "File is ${final_size_mb}MB - no split needed"
            fi
            
            cd - > /dev/null
            log_ok "Done: $safe_name"
            echo "$output_dir"
            return 0
          }
          
          # ═══════════════════
          # Process All URLs
          # ═══════════════════
          
          success=0
          fail=0
          all_output_dirs=""
          
          for url in $URLS; do
            result_dir=$(process_file "$url")
            
            if [ $? -eq 0 ]; then
              success=$((success + 1))
              all_output_dirs="$all_output_dirs $result_dir"
            else
              fail=$((fail + 1))
            fi
            
            echo ""
          done
          
          # ═══════════════════
          # Batch Mode
          # ═══════════════════
          
          if [ "$MODE" = "batch" ] && [ $success -gt 1 ]; then
            log_info "Creating batch archive..."
            
            batch_name="batch_$(date +%Y%m%d_%H%M%S)"
            batch_dir="downloads/complete/$batch_name"
            mkdir -p "$batch_dir"
            
            for dir in $all_output_dirs; do
              [ ! -d "$dir" ] && continue
              find "$dir" -type f -exec mv {} "$batch_dir/" \; 2>/dev/null
              rm -rf "$dir" 2>/dev/null
            done
            
            log_ok "Batch: $batch_name"
          fi
          
          rm -rf tmp_downloads
          
          # Summary
          echo ""
          echo "════════════════════════════════════════"
          echo "   ✅ Success: $success  |  ❌ Failed: $fail"
          echo "════════════════════════════════════════"
          echo ""
          echo "📁 Files (open .zip.001 directly!):"
          find downloads/complete -type f \( -name "*.zip" -o -name "*.zip.*" \) -exec ls -lh {} \; 2>/dev/null
          
          [ $fail -gt 0 ] && echo "" && echo "⚠️  Failed: downloads/failed/"

      - name: 📊 Create Report
        if: always()
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          
          {
            echo "# 📥 Downloaded Files"
            echo ""
            echo "> Updated: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "> ✨ **Multi-volume ZIP: Open .zip.001 directly!**"
            echo "> 📱 Works on Android, iOS, Windows, Mac, Linux"
            echo ""
            echo "---"
            
            if [ -d "downloads/complete" ] && [ "$(ls -A downloads/complete 2>/dev/null)" ]; then
              echo ""
              echo "## ✅ Successful Downloads"
              echo ""
              echo "| Folder | Size | Files | Link |"
              echo "|--------|------|-------|------|"
              
              for dir in downloads/complete/*/; do
                [ -d "$dir" ] || continue
                dname=$(basename "$dir")
                dsize=$(du -sh "$dir" 2>/dev/null | cut -f1)
                fcount=$(find "$dir" -type f ! -name "README.md" 2>/dev/null | wc -l)
                denc=$(echo "$dname" | sed 's/ /%20/g')
                dlink="${REPO_URL}/tree/${BRANCH}/downloads/complete/${denc}"
                echo "| [${dname}](${dlink}) | ${dsize} | ${fcount} | [📂](${dlink}) |"
              done
            fi
            
            if [ -d "downloads/failed" ] && [ "$(ls -A downloads/failed 2>/dev/null)" ]; then
              echo ""
              echo "## ❌ Failed"
              for dir in downloads/failed/*/; do
                [ -d "$dir" ] || continue
                dname=$(basename "$dir")
                denc=$(echo "$dname" | sed 's/ /%20/g')
                dlink="${REPO_URL}/tree/${BRANCH}/downloads/failed/${denc}"
                echo "- [${dname}](${dlink})"
              done
            fi
            
            echo ""
            echo "---"
            echo ""
            echo "### 🎯 How to Open (No Joining!)"
            echo ""
            echo "| Platform | Do This |"
            echo "|----------|---------|"
            echo "| 📱 Android | Open **.zip.001** with ZArchiver |"
            echo "| 📱 iOS | Open **.zip.001** with iZip |"
            echo "| 🖥️ Windows | Right-click **.zip.001** → 7-Zip → Extract |"
            echo "| 🍎 Mac | Double-click **.zip.001** |"
            echo "| 🐧 Linux | \`7z x file.zip.001\` |"
            echo ""
            echo "**✨ Just open the first part! No cat, no join, no merge!**"
          } > downloads/README.md
          
          echo "✅ Report created"

      - name: 💾 Commit and Push
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add downloads/ 2>/dev/null || true
          
          if git diff --cached --quiet 2>/dev/null; then
            echo "No changes"
            exit 0
          fi
          
          git commit -m "📥 Download complete [skip ci]" || true
          
          for i in 1 2 3; do
            git pull --rebase origin "${{ github.ref_name }}" 2>/dev/null && break
            sleep 5
          done
          
          git push origin HEAD:"${{ github.ref_name }}" 2>/dev/null || echo "Will retry next run"
          
          echo "✅ Saved"

      - name: 🎉 Done
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════════"
          echo "   🎉 Done!"
          echo "════════════════════════════════════════"
          echo ""
          echo "📱 Open .zip.001 directly with:"
          echo "   • ZArchiver (Android)"
          echo "   • iZip (iOS)"
          echo "   • 7-Zip (Windows)"
          echo "   • The Unarchiver (Mac)"
          echo ""
          echo "✨ No joining needed!"
