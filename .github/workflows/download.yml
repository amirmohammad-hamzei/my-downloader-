name: ⬇️ Download Manager

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'لینک‌های دانلود (هر خط یک لینک)'
        required: true
        type: string
      compress:
        description: 'فشرده‌سازی به ZIP'
        required: false
        default: true
        type: boolean
      password:
        description: 'رمز ZIP (اختیاری)'
        required: false
        default: ''
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Files
        env:
          URLS: ${{ github.event.inputs.urls }}
          COMPRESS: ${{ github.event.inputs.compress }}
          PASSWORD: ${{ github.event.inputs.password }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 zip unzip
          
          mkdir -p downloads
          cd downloads
          
          count=0
          success=0
          failed=0
          
          echo "$URLS" | while IFS= read -r url; do
            [ -z "$url" ] && continue
            count=$((count + 1))
            
            # Get filename
            filename=$(basename "$url" | cut -d'?' -f1 | cut -d'#' -f1)
            [ -z "$filename" ] && filename="file_${count}"
            
            echo "========================================="
            echo "[$count] Downloading: $filename"
            echo "URL: $url"
            echo ""
            
            # Try to download
            downloaded=false
            
            if aria2c -q -x4 -s4 --max-tries=3 --timeout=60 \
              --dir=. --out="$filename" "$url" 2>/dev/null; then
              if [ -s "$filename" ]; then
                downloaded=true
                echo "OK: Downloaded with aria2"
              fi
            fi
            
            if [ "$downloaded" = false ]; then
              if wget -q --tries=3 --timeout=60 \
                -U "Mozilla/5.0" -O "$filename" "$url" 2>/dev/null; then
                if [ -s "$filename" ]; then
                  downloaded=true
                  echo "OK: Downloaded with wget"
                fi
              fi
            fi
            
            if [ "$downloaded" = false ]; then
              if curl -L -# --retry 3 --connect-timeout 30 \
                -A "Mozilla/5.0" -o "$filename" "$url" 2>/dev/null; then
                if [ -s "$filename" ]; then
                  downloaded=true
                  echo "OK: Downloaded with curl"
                fi
              fi
            fi
            
            if [ "$downloaded" = true ]; then
              size=$(stat -c%s "$filename" 2>/dev/null || echo 0)
              size_mb=$((size / 1024 / 1024))
              echo "Size: ${size_mb} MB"
              
              # Compress if needed
              if [ "$COMPRESS" = "true" ]; then
                ext="${filename##*.}"
                ext_lower=$(echo "$ext" | tr '[:upper:]' '[:lower:]')
                
                if [ "$ext_lower" != "zip" ] && [ "$ext_lower" != "rar" ] && [ "$ext_lower" != "7z" ]; then
                  echo "Compressing to ZIP..."
                  zipname="${filename}.zip"
                  
                  if [ -n "$PASSWORD" ]; then
                    zip -P "$PASSWORD" "$zipname" "$filename" 2>/dev/null
                  else
                    zip "$zipname" "$filename" 2>/dev/null
                  fi
                  
                  if [ -s "$zipname" ]; then
                    rm "$filename"
                    filename="$zipname"
                    size=$(stat -c%s "$filename" 2>/dev/null || echo 0)
                    size_mb=$((size / 1024 / 1024))
                    echo "Compressed: ${size_mb} MB"
                  fi
                fi
              fi
              
              # Split if > 90MB
              if [ "$size" -gt 94371840 ]; then
                echo "Splitting into 90MB parts..."
                
                # Create folder for parts
                base="${filename%.*}"
                mkdir -p "${base}_parts"
                
                # Split file
                split -b 90M -d "$filename" "${base}_parts/${base}.part"
                
                if [ $? -eq 0 ]; then
                  # Rename parts
                  cd "${base}_parts"
                  n=1
                  for part in *.part*; do
                    newname=$(printf "${base}.%03d" $n)
                    mv "$part" "$newname"
                    n=$((n + 1))
                  done
                  
                  total=$((n - 1))
                  cd ..
                  
                  # Remove original
                  rm "$filename"
                  
                  echo "Split into ${total} parts"
                  
                  # Create join script
                  cat > "${base}_parts/README.md" << EOF
          # Split File: $filename
          
          Original size: ${size_mb} MB
          Parts: ${total} × 90MB
          
          ## How to Join
          
          ### Windows
          \`\`\`cmd
          copy /b ${base}.001 + ${base}.002 + ${base}.003 ${filename}
          \`\`\`
          
          ### Mac/Linux
          \`\`\`bash
          cat ${base}.* > ${filename}
          \`\`\`
          
          ### Android (Termux)
          \`\`\`bash
          cat ${base}.* > ${filename}
          \`\`\`
          
          ### iOS
          Transfer to computer first
          EOF
                  
                  # Create Windows batch file
                  {
                    echo "@echo off"
                    echo "echo Joining ${total} parts..."
                    printf "copy /b "
                    for i in $(seq 1 $total); do
                      printf "${base}.%03d" $i
                      [ $i -lt $total ] && printf "+"
                    done
                    echo " ${filename}"
                    echo "echo Done!"
                    echo "pause"
                  } > "${base}_parts/join.bat"
                  
                  # Create Linux/Mac script
                  {
                    echo "#!/bin/bash"
                    echo "echo 'Joining ${total} parts...'"
                    echo "cat ${base}.* > ${filename}"
                    echo "echo 'Done!'"
                  } > "${base}_parts/join.sh"
                  chmod +x "${base}_parts/join.sh"
                  
                else
                  echo "Split failed - keeping original file"
                fi
              fi
              
              success=$((success + 1))
              echo "DONE"
            else
              failed=$((failed + 1))
              echo "FAILED"
              echo "$url" >> ../failed_urls.txt
            fi
            
            echo ""
          done
          
          cd ..
          
          echo "========================================="
          echo "Results: $success done, $failed failed"
          echo "========================================="
          
          # Create main README
          {
            echo "# 📥 Downloaded Files"
            echo ""
            echo "Date: $(date)"
            echo ""
            echo "## Files"
            echo ""
            find downloads -type f ! -name "README.md" ! -name "*.bat" ! -name "*.sh" -exec ls -lh {} \; 2>/dev/null | while read line; do
              echo "$line"
            done
            echo ""
            echo "## Notes"
            echo "- Split files need to be joined first"
            echo "- Run join.bat (Windows) or join.sh (Mac/Linux)"
            echo "- Android: Use Termux or transfer to PC"
          } > downloads/README.md

      - name: Save to Repository
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/ failed_urls.txt 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          
          git commit -m "📥 Download [skip ci]" 2>/dev/null || true
          git pull --rebase 2>/dev/null || true
          git push 2>/dev/null || echo "Push skipped"
          
          echo "Saved!"

      - name: Done
        if: always()
        run: |
          echo ""
          echo "=============================="
          echo " COMPLETE"
          echo "=============================="
          find downloads -type f -name "*.zip" -o -name "*.0*" 2>/dev/null | head -20
