name: 🧪 Download Test

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک تست'
        required: true
        type: string
        default: 'https://httpbin.org/bytes/1024'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Test Download
        run: |
          echo "=== Download Test ==="
          echo "URL: ${{ github.event.inputs.url }}"
          echo ""
          
          # Test with all methods
          echo "1. Testing curl..."
          curl -L -o test_curl.dat "${{ github.event.inputs.url }}" -w "  Size: %{size_download} bytes\n  Time: %{time_total}s\n" 2>&1 || echo "  FAILED"
          
          echo "2. Testing wget..."
          wget -O test_wget.dat "${{ github.event.inputs.url }}" 2>&1 || echo "  FAILED"
          ls -lh test_wget.dat 2>/dev/null || echo "  No file created"
          
          echo "3. Testing aria2..."
          sudo apt-get update -qq && sudo apt-get install -y -qq aria2
          aria2c -d . -o test_aria2.dat "${{ github.event.inputs.url }}" 2>&1 || echo "  FAILED"
          ls -lh test_aria2.dat 2>/dev/null || echo "  No file created"
          
          echo ""
          echo "=== Results ==="
          ls -lh test_*.dat 2>/dev/null || echo "No files downloaded!"

      - name: Save Results
        if: always()
        run: |
          mkdir -p downloads
          if [ -f test_curl.dat ]; then
            cp test_curl.dat downloads/
            echo "Download successful!" > downloads/README.md
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/ 2>/dev/null
          git commit -m "Test download" 2>/dev/null || true
          git push 2>/dev/null || echo "Push skipped (no changes or permission issue)"
