name: ⬇️ Download Manager v2

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'لینک های دانلود (هر خط یک لینک)'
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Process
        env:
          URLS: ${{ github.event.inputs.urls }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq aria2
          
          # Clean start
          rm -rf downloads
          mkdir -p downloads
          
          cd downloads
          
          echo "Starting downloads..."
          count=0
          
          echo "$URLS" | while IFS= read -r url; do
            [ -z "$url" ] && continue
            count=$((count + 1))
            
            filename=$(basename "$url" | cut -d'?' -f1 | cut -d'#' -f1)
            [ -z "$filename" ] && filename="file_${count}"
            
            echo ""
            echo "========================================="
            echo "[$count] $filename"
            echo "========================================="
            
            # Download
            if ! aria2c -q -x4 -s4 --max-tries=3 --timeout=120 \
              --dir=. --out="$filename" "$url" 2>/dev/null; then
              echo "aria2 failed, trying wget..."
              wget -q --tries=3 --timeout=60 -O "$filename" "$url" 2>/dev/null || \
              curl -L -s --retry 3 -o "$filename" "$url"
            fi
            
            if [ ! -s "$filename" ]; then
              echo "FAILED to download"
              continue
            fi
            
            size=$(stat -c%s "$filename")
            size_mb=$((size / 1024 / 1024))
            echo "Size: ${size_mb}MB"
            
            # Split if > 90MB
            if [ "$size" -gt 94371840 ]; then
              echo "Splitting into 90MB parts..."
              
              base="${filename%.*}"
              split_name="${base}_split"
              mkdir -p "$split_name"
              
              # Move file and split
              mv "$filename" "$split_name/"
              cd "$split_name"
              
              split -b 90M -d "$filename" "part_"
              
              if [ $? -eq 0 ]; then
                rm "$filename"  # Remove original large file
                
                # Rename parts
                n=1
                for part in part_*; do
                  new_name=$(printf "${base}.part%02d" $n)
                  mv "$part" "$new_name"
                  n=$((n + 1))
                done
                
                total_parts=$((n - 1))
                echo "Split into ${total_parts} parts:"
                ls -lh
                
                # Create README
                echo "# Split File: $filename" > README.md
                echo "" >> README.md
                echo "Original size: ${size_mb}MB" >> README.md
                echo "Parts: ${total_parts}" >> README.md
                echo "" >> README.md
                echo "## Join Instructions" >> README.md
                echo "" >> README.md
                echo "### Windows" >> README.md
                echo "\`\`\`cmd" >> README.md
                printf "copy /b " >> README.md
                for i in $(seq 1 $total_parts); do
                  printf "${base}.part%02d" $i >> README.md
                  [ $i -lt $total_parts ] && printf "+" >> README.md
                done
                echo " ${filename}" >> README.md
                echo "\`\`\`" >> README.md
                echo "" >> README.md
                echo "### Mac/Linux/Android (Termux)" >> README.md
                echo "\`\`\`bash" >> README.md
                printf "cat ${base}.part* > ${filename}" >> README.md
                echo "" >> README.md
                echo "\`\`\`" >> README.md
              else
                echo "Split failed!"
              fi
              
              cd ..
            else
              echo "No split needed (under 90MB)"
            fi
            
            echo "✓ Done: $filename"
          done
          
          cd ..
          
          echo ""
          echo "========================================="
          echo "DOWNLOAD COMPLETE"
          echo "========================================="
          echo ""
          echo "Files to be saved:"
          find downloads -type f -exec ls -lh {} \; 2>/dev/null
          
          # Create main README
          {
            echo "# Downloaded Files"
            echo ""
            echo "Date: $(date)"
            echo ""
            echo "## Contents"
            echo ""
            find downloads -type f -name "*.part*" -o -name "*.zip" -o -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.apk" | while read f; do
              ls -lh "$f" | awk '{print "- " $NF " (" $5 ")"}'
            done
          } > downloads/README.md

      - name: Check Before Save
        run: |
          echo "Current directory: $(pwd)"
          echo ""
          echo "Downloads folder contents:"
          find downloads -type f -exec ls -lh {} \; 2>/dev/null || echo "EMPTY!"
          echo ""
          echo "Total files: $(find downloads -type f | wc -l)"
          echo "Total size: $(du -sh downloads 2>/dev/null | cut -f1)"

      - name: Save to Repository
        if: always()
        run: |
          echo "Saving files..."
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check what's in downloads
          echo "Files to add:"
          ls -la downloads/ 2>/dev/null
          
          # Stage everything in downloads
          git add downloads/
          
          # Show what will be committed
          echo ""
          echo "Staged files:"
          git diff --cached --name-only 2>/dev/null || echo "Nothing staged"
          
          # Check if there are changes
          if git diff --cached --quiet 2>/dev/null; then
            echo ""
            echo "WARNING: No changes to commit!"
            echo "This means files weren't staged properly."
            exit 0
          fi
          
          # Commit
          git commit -m "📥 Download complete [skip ci]"
          
          # Push
          echo "Pushing..."
          git pull --rebase origin ${{ github.ref_name }} 2>/dev/null || true
          git push origin HEAD:${{ github.ref_name }}
          
          echo ""
          echo "========================================="
          echo "FILES SAVED!"
          echo "========================================="
          echo ""
          echo "Download from:"
          echo "${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}/downloads"

      - name: Final Check
        if: always()
        run: |
          echo ""
          echo "=============================="
          echo "SUMMARY"
          echo "=============================="
          
          if [ -d "downloads" ]; then
            echo ""
            echo "📁 Your files:"
            echo "${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}/downloads"
            echo ""
            find downloads -type f -exec ls -lh {} \; 2>/dev/null
          else
            echo "No downloads folder found"
          fi
          
          echo ""
          echo "For split files:"
          echo "1. Download ALL parts"
          echo "2. cat file.part* > file.zip"
