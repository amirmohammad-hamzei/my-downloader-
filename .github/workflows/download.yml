name: ⬇️ Download Manager

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'لینک‌های دانلود (با فاصله جدا کنید)'
        required: true
        type: string
      mode:
        description: 'حالت دانلود'
        required: false
        default: 'single'
        type: choice
        options:
          - single
          - batch
      compression:
        description: 'فشرده‌سازی'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - always
          - never
      password:
        description: 'رمز فایل zip (اختیاری)'
        required: false
        default: ''
        type: string
      split_size:
        description: 'حداکثر حجم هر بخش (MB)'
        required: false
        default: '90'
        type: string

jobs:
  download-files:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 📦 Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 zip unzip curl wget bc

      - name: 📥 Download and Process Files
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          # ═══════════════════════════════
          # Download Manager - All in One
          # ═══════════════════════════════
          
          set -e
          
          # Create directories
          mkdir -p downloads/complete
          mkdir -p downloads/failed
          mkdir -p downloads/logs
          mkdir -p tmp_downloads
          
          # Settings
          SPLIT_MB="${{ github.event.inputs.split_size }}"
          SPLIT_BYTES=$((SPLIT_MB * 1024 * 1024))
          PASSWORD="${{ github.event.inputs.password }}"
          COMPRESSION="${{ github.event.inputs.compression }}"
          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          MAX_RETRIES=3
          
          echo "════════════════════════════════════════"
          echo "   🚀 Download Manager"
          echo "════════════════════════════════════════"
          echo "Mode: $MODE | Compression: $COMPRESSION"
          echo "Split: ${SPLIT_MB}MB | Password: $([ -n "$PASSWORD" ] && echo 'YES' || echo 'NO')"
          echo ""
          
          # ═══════════════════
          # Helper Functions
          # ═══════════════════
          
          log_ok() { echo "✅ $1"; echo "✅ $1" >> downloads/logs/session.log; }
          log_err() { echo "❌ $1"; echo "❌ $1" >> downloads/logs/session.log; }
          log_info() { echo "ℹ️  $1"; }
          
          sanitize() {
            echo "$1" | sed 's/[<>:"|?*\\]/_/g' | sed 's/%20/ /g' | sed 's/[?#].*//'
          }
          
          need_compress() {
            local f="$1"
            local mode="$2"
            case "$mode" in
              always) return 0 ;;
              never) return 1 ;;
              auto)
                local ext=$(echo "${f##*.}" | tr '[:upper:]' '[:lower:]')
                case "$ext" in
                  zip|rar|7z|gz|bz2|xz|tar|iso|dmg|exe|msi|mp4|mkv|avi|mp3|jpg|png|pdf) return 1 ;;
                  *) return 0 ;;
                esac ;;
            esac
          }
          
          download_file() {
            local url="$1"
            local output="$2"
            local fname=$(basename "$output")
            
            for try in $(seq 1 $MAX_RETRIES); do
              log_info "Attempt $try/$MAX_RETRIES: $fname"
              
              if timeout 600 aria2c -q --split=4 --max-connection-per-server=4 \
                --min-split-size=20M --max-tries=2 --retry-wait=5 \
                --timeout=60 --connect-timeout=30 --check-certificate=true \
                --allow-overwrite=true --auto-file-renaming=false \
                --dir="$(dirname "$output")" --out="$fname" "$url" 2>/dev/null; then
                [ -s "$output" ] && { log_ok "Downloaded: $fname"; return 0; }
              fi
              
              log_info "Trying wget..."
              if timeout 600 wget -q --show-progress --tries=2 --timeout=60 \
                -U "Mozilla/5.0" -O "$output" "$url" 2>&1; then
                [ -s "$output" ] && { log_ok "Downloaded: $fname"; return 0; }
              fi
              
              log_info "Trying curl..."
              if timeout 600 curl -L -f -# --retry 2 --retry-delay 5 \
                --connect-timeout 30 --max-time 3600 \
                -A "Mozilla/5.0" -o "$output" "$url" 2>&1; then
                [ -s "$output" ] && { log_ok "Downloaded: $fname"; return 0; }
              fi
              
              [ $try -lt $MAX_RETRIES ] && sleep $((try * 15))
            done
            
            rm -f "$output"
            log_err "Failed: $fname"
            return 1
          }

          # ═══════════════════════════════
          # Function: Split file into parts
          # ═══════════════════════════════
          
          split_into_parts() {
            local file_to_split="$1"
            local output_dir="$2"
            local base_name="$3"
            local split_mb="$4"
            
            cd "$output_dir"
            
            local original_filename=$(basename "$file_to_split")
            local original_size=$(stat -c%s "$file_to_split" 2>/dev/null || echo 0)
            local original_size_mb=$((original_size / 1024 / 1024))
            
            log_info "Splitting ${original_size_mb}MB into ${split_mb}MB parts..."
            
            # Split into parts
            split -b "${split_mb}M" -d "$original_filename" "${base_name}.part"
            rm -f "$original_filename"
            
            # Rename parts
            local part_num=1
            for part in ${base_name}.part*; do
              local ext_num=$(printf "%02d" $part_num)
              mv "$part" "${base_name}.part${ext_num}.zip"
              part_num=$((part_num + 1))
            done
            
            local total_parts=$((part_num - 1))
            
            # Create Windows batch file
            {
              echo "@echo off"
              echo "title Join ZIP Parts - ${base_name}"
              echo "echo."
              echo "echo ========================================="
              echo "echo   Joining ${total_parts} parts into ${base_name}.zip"
              echo "echo ========================================="
              echo "echo."
              printf "copy /b \"${base_name}.part01.zip\""
              for i in $(seq 2 $total_parts); do
                printf " + \"${base_name}.part%02d.zip\"" $i
              done
              echo " \"${base_name}.zip\""
              echo "if exist \"${base_name}.zip\" ("
              echo "  echo."
              echo "  echo SUCCESS! Created: ${base_name}.zip"
              echo "  echo Now extract with 7-Zip or WinRAR"
              echo ") else ("
              echo "  echo."
              echo "  echo FAILED! Make sure all parts are in this folder"
              echo ")"
              echo "pause"
            } > "JOIN_PARTS.bat"
            
            # Create Linux/Mac script
            {
              echo "#!/bin/bash"
              echo "echo '========================================'"
              echo "echo '  Joining ${total_parts} parts into ${base_name}.zip'"
              echo "echo '========================================'"
              echo "echo"
              echo "cat ${base_name}.part??.zip > \"${base_name}.zip\""
              echo "if [ -f \"${base_name}.zip\" ]; then"
              echo "  echo 'SUCCESS! Created: ${base_name}.zip'"
              echo "  echo"
              echo "  echo 'Now extract with:'"
              echo "  echo '  unzip ${base_name}.zip'"
              if [ -n "$PASSWORD" ]; then
                echo "  echo '  (password required)'"
              fi
              echo "else"
              echo "  echo 'FAILED! Make sure all parts are in this folder'"
              echo "fi"
            } > "join_parts.sh"
            
            chmod +x join_parts.sh
            
            log_ok "Split complete: ${total_parts} parts + merge scripts"
            echo "${total_parts}|${base_name}"
          }

          # ═══════════════════════════════
          # Function: Process single URL
          # ═══════════════════════════════

          process_file() {
            local url="$1"
            
            local original_name=$(basename "$url" | sed 's/%20/ /g' | sed 's/[?#].*//')
            local safe_name=$(sanitize "$original_name")
            local temp_file="tmp_downloads/${safe_name}"
            local base_name="${safe_name%.*}"
            local output_dir="downloads/complete/${base_name}"
            
            echo "────────────────────────────────────────"
            log_info "URL: $url"
            log_info "File: $safe_name"
            
            # Download
            if ! download_file "$url" "$temp_file"; then
              local err_dir="downloads/failed/${base_name}_$(date +%s)"
              mkdir -p "$err_dir"
              {
                echo "# ❌ Download Failed"
                echo ""
                echo "| Info | Value |"
                echo "|------|-------|"
                echo "| File | $safe_name |"
                echo "| URL | $url |"
                echo "| Date | $(date) |"
                echo ""
                echo "## Possible Fixes"
                echo "1. Check URL in browser"
                echo "2. Try again later"
                echo "3. Some servers block bots"
              } > "$err_dir/README.md"
              return 1
            fi
            
            # Get size
            local size=$(stat -c%s "$temp_file" 2>/dev/null || echo 0)
            local size_mb=$((size / 1024 / 1024))
            
            mkdir -p "$output_dir"
            
            local working_file="$output_dir/${safe_name}"
            mv "$temp_file" "$working_file"
            
            # ═══════════════════
            # Step 1: Compression
            # ═══════════════════
            
            local current_file="$safe_name"
            local current_path="$output_dir/$current_file"
            local is_zipped=false
            
            cd "$output_dir"
            
            if need_compress "$safe_name" "$COMPRESSION"; then
              log_info "Compressing to ZIP (${size_mb}MB)..."
              
              local zip_name="${safe_name}.zip"
              
              if [ -n "$PASSWORD" ]; then
                zip -j -P "$PASSWORD" "$zip_name" "$current_file" -q 2>/dev/null
              else
                zip -j "$zip_name" "$current_file" -q 2>/dev/null
              fi
              
              rm -f "$current_file"
              current_file="$zip_name"
              current_path="$output_dir/$current_file"
              is_zipped=true
              
              local new_size=$(stat -c%s "$current_path" 2>/dev/null || echo 0)
              log_ok "Compressed: $current_file ($(($new_size / 1024 / 1024))MB)"
            else
              log_ok "Saved without compression (${size_mb}MB)"
            fi
            
            cd - > /dev/null
            
            local final_size=$(stat -c%s "$output_dir/$current_file" 2>/dev/null || echo 0)
            local final_size_mb=$((final_size / 1024 / 1024))
            
            # ═══════════════════
            # Step 2: Split if needed
            # ═══════════════════
            
            if [ "$final_size" -gt "$SPLIT_BYTES" ]; then
              log_info "File is ${final_size_mb}MB - splitting..."
              
              # Wrap in ZIP if not already
              if [ "$is_zipped" = false ]; then
                log_info "Wrapping in ZIP..."
                
                cd "$output_dir"
                
                local wrap_zip="${safe_name}.zip"
                
                if [ -n "$PASSWORD" ]; then
                  zip -j -P "$PASSWORD" "$wrap_zip" "$current_file" -q 2>/dev/null
                else
                  zip -j "$wrap_zip" "$current_file" -q 2>/dev/null
                fi
                
                rm -f "$current_file"
                current_file="$wrap_zip"
                current_path="$output_dir/$current_file"
                
                cd - > /dev/null
              fi
              
              # Split
              local split_info=$(split_into_parts "$current_path" "$output_dir" "$base_name" "$SPLIT_MB")
              local part_count=$(echo "$split_info" | cut -d'|' -f1)
              local split_base=$(echo "$split_info" | cut -d'|' -f2)
              
              # Create README
              {
                echo "# 📦 Split ZIP: $safe_name"
                echo ""
                echo "> Split into ${part_count} parts (total: ${final_size_mb}MB)"
                echo "> 📱 Works on ALL devices"
                echo ""
                echo "| Info | Value |"
                echo "|------|-------|"
                echo "| Original | $safe_name |"
                echo "| Total Size | ${final_size_mb} MB |"
                echo "| Parts | ${part_count} |"
                echo "| Password | $([ -n "$PASSWORD" ] && echo "YES 🔐" || echo "NO") |"
                echo ""
                echo "## 📁 Files"
                echo ""
                
                for part in "$output_dir"/${split_base}.part*.zip; do
                  [ -f "$part" ] || continue
                  local pname=$(basename "$part")
                  local psize=$(ls -lh "$part" 2>/dev/null | awk '{print $5}')
                  echo "- \`$pname\` ($psize)"
                done
                
                echo "- \`JOIN_PARTS.bat\` (Windows)"
                echo "- \`join_parts.sh\` (Mac/Linux)"
                echo ""
                echo "---"
                echo ""
                echo "## 🖥️ Windows"
                echo "1. Put ALL files in one folder"
                echo "2. Double-click **JOIN_PARTS.bat**"
                echo "3. Extract the ZIP with 7-Zip or WinRAR"
                echo ""
                echo "## 🐧 Linux / 🍎 Mac"
                echo '```bash'
                echo "chmod +x join_parts.sh && ./join_parts.sh"
                echo "unzip ${base_name}.zip"
                echo '```'
                echo ""
                echo "## 📱 Android"
                echo "1. Download all parts"
                echo "2. Install **File Joiner** app"
                echo "3. Join files, then extract with **ZArchiver**"
                echo ""
                echo "## 📱 iOS"
                echo "Transfer to computer and use Windows/Mac method"
                echo ""
                echo "## ⚠️ Important"
                echo "- ALL parts must be in the same folder"
                echo "- Do NOT rename the files"
                echo "- Parts order: part01, part02, part03, ..."
                
                if [ -n "$PASSWORD" ]; then
                  echo ""
                  echo "> 🔐 Password: The one you set when downloading"
                fi
              } > "$output_dir/README.md"
              
              log_ok "Split complete: ${part_count} parts"
              
            else
              # No split needed
              {
                echo "# 📦 File: $safe_name"
                echo ""
                echo "| Info | Value |"
                echo "|------|-------|"
                echo "| File | $current_file |"
                echo "| Size | ${final_size_mb} MB |"
                echo "| Type | $([ "$is_zipped" = true ] && echo "ZIP Archive" || echo "Original File") |"
                echo "| Password | $([ -n "$PASSWORD" ] && echo "YES 🔐" || echo "NO") |"
                echo ""
                echo "## 📱 Extract on..."
                echo ""
                echo "| Platform | Method |"
                echo "|----------|--------|"
                echo "| Windows | 7-Zip or WinRAR |"
                echo "| Mac | Double-click |"
                echo "| Linux | \`unzip $current_file\` |"
                echo "| Android | ZArchiver app |"
                echo "| iOS | iZip app |"
                
                if [ -n "$PASSWORD" ]; then
                  echo ""
                  echo "> 🔐 Password: The one you set when downloading"
                fi
              } > "$output_dir/README.md"
              
              log_ok "File is ${final_size_mb}MB - no split needed"
            fi
            
            log_ok "Done: $safe_name"
            echo "$output_dir"
            return 0
          }
          
          # ═══════════════════
          # Process Each URL
          # ═══════════════════
          
          success=0
          fail=0
          all_output_dirs=""
          
          for url in $URLS; do
            result_dir=$(process_file "$url")
            
            if [ $? -eq 0 ]; then
              success=$((success + 1))
              all_output_dirs="$all_output_dirs $result_dir"
            else
              fail=$((fail + 1))
            fi
            
            echo ""
          done
          
          # ═══════════════════
          # Batch Mode
          # ═══════════════════
          
          if [ "$MODE" = "batch" ] && [ $success -gt 1 ]; then
            echo "────────────────────────────────────────"
            log_info "Creating batch archive..."
            
            batch_name="batch_$(date +%Y%m%d_%H%M%S)"
            batch_dir="downloads/complete/$batch_name"
            mkdir -p "$batch_dir"
            
            for dir in $all_output_dirs; do
              [ ! -d "$dir" ] && continue
              find "$dir" -type f -exec mv {} "$batch_dir/" \; 2>/dev/null
              rm -rf "$dir" 2>/dev/null
            done
            
            log_ok "Batch created: $batch_name"
          fi
          
          # Cleanup
          rm -rf tmp_downloads
          
          # Summary
          echo ""
          echo "════════════════════════════════════════"
          echo "   ✅ Success: $success  |  ❌ Failed: $fail"
          echo "════════════════════════════════════════"
          echo ""
          echo "📁 Downloaded files:"
          find downloads/complete -type f -name "*.zip" -o -name "*.part*.zip" | while read f; do
            ls -lh "$f" 2>/dev/null
          done
          
          if [ $fail -gt 0 ]; then
            echo ""
            echo "⚠️  Failed downloads in: downloads/failed/"
          fi

      - name: 📊 Create Report in downloads folder
        if: always()
        run: |
          echo "📊 Creating report..."
          
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          
          {
            echo "# 📥 Downloaded Files"
            echo ""
            echo "> Last update: $(date '+%Y-%m-%d %H:%M:%S')"
            echo "> 📱 Compatible with all devices"
            echo ""
            echo "---"
            
            if [ -d "downloads/complete" ] && [ "$(ls -A downloads/complete 2>/dev/null)" ]; then
              echo ""
              echo "## ✅ Successful Downloads"
              echo ""
              echo "| Folder | Size | Files | Link |"
              echo "|--------|------|-------|------|"
              
              for dir in downloads/complete/*/; do
                [ -d "$dir" ] || continue
                dname=$(basename "$dir")
                dsize=$(du -sh "$dir" 2>/dev/null | cut -f1)
                fcount=$(find "$dir" -type f ! -name "README.md" ! -name "*.bat" ! -name "*.sh" 2>/dev/null | wc -l)
                denc=$(echo "$dname" | sed 's/ /%20/g')
                dlink="${REPO_URL}/tree/${BRANCH}/downloads/complete/${denc}"
                echo "| [${dname}](${dlink}) | ${dsize} | ${fcount} | [Open](${dlink}) |"
              done
            else
              echo ""
              echo "_No files downloaded yet_"
            fi
            
            if [ -d "downloads/failed" ] && [ "$(ls -A downloads/failed 2>/dev/null)" ]; then
              echo ""
              echo "## ❌ Failed Downloads"
              echo ""
              for dir in downloads/failed/*/; do
                [ -d "$dir" ] || continue
                dname=$(basename "$dir")
                denc=$(echo "$dname" | sed 's/ /%20/g')
                dlink="${REPO_URL}/tree/${BRANCH}/downloads/failed/${denc}"
                echo "- [${dname}](${dlink})"
              done
            fi
            
            echo ""
            echo "---"
            echo ""
            echo "### 📱 How to join split files"
            echo ""
            echo "| Platform | Method |"
            echo "|----------|--------|"
            echo "| Windows | Double-click JOIN_PARTS.bat |"
            echo "| Mac/Linux | Run: ./join_parts.sh |"
            echo "| Android | File Joiner app + ZArchiver |"
            echo "| iOS | Transfer to PC/Mac first |"
            echo ""
            echo "**⚠️ All parts must be in the same folder!**"
          } > downloads/README.md
          
          echo "✅ Report created"

      - name: 💾 Commit and Push
        if: always()
        run: |
          echo "💾 Saving files..."
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add downloads/ 2>/dev/null || true
          
          if git diff --cached --quiet 2>/dev/null; then
            echo "No changes to commit"
            exit 0
          fi
          
          success_count=$(find downloads/complete -type f ! -name "README.md" ! -name "*.bat" ! -name "*.sh" 2>/dev/null | wc -l)
          fail_count=$(find downloads/failed -mindepth 1 -type d 2>/dev/null | wc -l)
          
          commit_msg="📥 Download: ${success_count} files"
          [ "$fail_count" -gt 0 ] && commit_msg="${commit_msg}, ${fail_count} failed"
          commit_msg="${commit_msg} [skip ci]"
          
          git commit -m "$commit_msg" || echo "Nothing to commit"
          
          for i in 1 2 3; do
            git pull --rebase origin "${{ github.ref_name }}" 2>/dev/null && break
            sleep 5
          done
          
          git push origin HEAD:"${{ github.ref_name }}" || echo "Push will retry next run"
          
          echo "✅ Saved"

      - name: 🎉 Done
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════════"
          echo "   🎉 Session Complete!"
          echo "════════════════════════════════════════"
          echo ""
          echo "📁 Files saved in: downloads/"
          echo "📊 Report: downloads/README.md"
