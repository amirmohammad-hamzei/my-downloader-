name: Download Manager - Send to Bale Bot

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'دانلود لینک (هر خط یک لینک)'
        required: true
        type: string
      password:
        description: 'رمز فایل ZIP (اختیاری)'
        required: false
        default: ''
        type: string
      chat_id:
        description: 'Chat ID ربات بله'
        required: true
        type: string
      bot_token:
        description: 'توکن ربات بله'
        required: true
        type: string

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 zip unzip curl jq

      - name: Download and Send to Bale Bot
        env:
          URLS: ${{ github.event.inputs.urls }}
          PASSWORD: ${{ github.event.inputs.password }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          BALE_BOT_TOKEN: ${{ github.event.inputs.bot_token }}
        run: |
          # Create temp directory
          TEMP_DIR=$(mktemp -d)
          cd "$TEMP_DIR" || exit 1
          
          echo "Temp directory: $TEMP_DIR"
          echo "Chat ID: $CHAT_ID"
          
          # Function to send message
          send_message() {
            local response=$(curl -s -X POST "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendMessage" \
              -F "chat_id=${CHAT_ID}" \
              -F "text=$1")
            
            echo "Message response: $response"
            
            if echo "$response" | grep -q '"ok":false'; then
              echo "WARNING: Cannot send message. Bot might be blocked."
              echo "Please unblock the bot and try again."
            fi
          }
          
          # Function to send document
          send_document() {
            local file_path="$1"
            local caption="$2"
            
            echo "Sending file: $file_path (Size: $(stat -c%s "$file_path" 2>/dev/null || echo 0) bytes)"
            
            local response=$(curl -s -X POST "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendDocument" \
              -F "chat_id=${CHAT_ID}" \
              -F "document=@${file_path}" \
              -F "caption=${caption}")
            
            echo "Document response: $response"
            
            if echo "$response" | grep -q '"ok":true'; then
              return 0
            else
              return 1
            fi
          }
          
          # Test bot connection first
          echo "Testing bot connection..."
          TEST_RESPONSE=$(curl -s "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/getMe")
          echo "Bot info: $TEST_RESPONSE"
          
          if echo "$TEST_RESPONSE" | grep -q '"ok":true'; then
            echo "Bot connection OK"
          else
            echo "ERROR: Cannot connect to bot. Check token."
          fi
          
          # Send start notification (ignore if blocked)
          send_message "شروع دانلود فایل ها..." || true
          
          # Process URLs
          echo "$URLS" > urls.txt
          
          count=0
          while IFS= read -r url; do
            # Skip empty lines
            [ -z "$url" ] && continue
            
            count=$((count + 1))
            echo ""
            echo "========================================="
            echo "Processing URL $count: $url"
            
            # Extract filename
            filename=$(basename "$url" | cut -d'?' -f1 | cut -d'#' -f1)
            if [ -z "$filename" ]; then
              filename="download_${count}.bin"
            fi
            
            # Replace spaces and special chars
            filename=$(echo "$filename" | sed 's/%20/_/g' | sed 's/[^a-zA-Z0-9._-]/_/g')
            
            echo "Filename: $filename"
            send_message "شروع دانلود: $filename" || true
            
            # Download with multiple methods
            downloaded=false
            
            # Method 1: aria2c
            echo "Trying aria2c..."
            if aria2c -x4 -s4 --max-tries=3 --timeout=120 \
              --dir="." --out="$filename" "$url" 2>&1; then
              if [ -f "$filename" ] && [ -s "$filename" ]; then
                downloaded=true
                echo "Downloaded with aria2c"
              fi
            fi
            
            # Method 2: wget
            if [ "$downloaded" = false ]; then
              echo "Trying wget..."
              if wget --tries=3 --timeout=60 -U "Mozilla/5.0" -O "$filename" "$url" 2>&1; then
                if [ -f "$filename" ] && [ -s "$filename" ]; then
                  downloaded=true
                  echo "Downloaded with wget"
                fi
              fi
            fi
            
            # Method 3: curl
            if [ "$downloaded" = false ]; then
              echo "Trying curl..."
              if curl -L --retry 3 --connect-timeout 30 -A "Mozilla/5.0" -o "$filename" "$url" 2>&1; then
                if [ -f "$filename" ] && [ -s "$filename" ]; then
                  downloaded=true
                  echo "Downloaded with curl"
                fi
              fi
            fi
            
            if [ "$downloaded" = false ] || [ ! -f "$filename" ]; then
              echo "ERROR: Failed to download: $filename"
              send_message "خطا در دانلود: $filename" || true
              continue
            fi
            
            # Get file size
            size=$(stat -c%s "$filename" 2>/dev/null || echo 0)
            size_mb=$((size / 1048576))
            echo "Downloaded: $size_mb MB"
            
            # Check file extension
            extension="${filename##*.}"
            extension_lower=$(echo "$extension" | tr '[:upper:]' '[:lower:]')
            
            send_message "دانلود شد: $filename ($size_mb MB)" || true
            
            # Handle based on file type and size
            if [ "$size" -le 52428800 ]; then
              # File under 50MB - send directly
              echo "File under 50MB, sending directly..."
              send_document "$filename" "فایل: $filename" || echo "Failed to send file"
              
            elif [ "$extension_lower" = "zip" ]; then
              # Already a ZIP file - just split and send
              echo "File is already ZIP, splitting into parts..."
              
              parts_dir="parts_${filename%.*}"
              mkdir -p "$parts_dir"
              cp "$filename" "$parts_dir/"
              cd "$parts_dir"
              
              base="${filename%.*}"
              
              # Split the ZIP file
              split -b 45000000 -d "$filename" "part_"
              
              if [ $? -eq 0 ] && [ -f "part_00" ]; then
                rm -f "$filename"
                
                # Rename and send parts
                part_num=1
                for part in part_*; do
                  if [ -f "$part" ]; then
                    new_name=$(printf "%s.zip.%03d" "$base" $part_num)
                    mv "$part" "$new_name"
                    
                    echo "Sending part $part_num: $new_name"
                    send_document "$new_name" "بخش $part_num - $base" || echo "Failed to send part $part_num"
                    
                    part_num=$((part_num + 1))
                  fi
                done
                
                total_parts=$((part_num - 1))
                echo "Split complete: $total_parts parts"
                send_message "فایل به $total_parts بخش تقسیم شد. برای اتصال: cat ${base}.zip.* > ${base}.zip" || true
              else
                echo "Split failed"
                send_message "خطا در تقسیم فایل" || true
              fi
              
              cd "$TEMP_DIR"
              
            else
              # Not a ZIP - compress then split
              echo "Compressing file..."
              
              base="${filename%.*}"
              zip_name="${base}.zip"
              
              if [ -n "$PASSWORD" ]; then
                zip -P "$PASSWORD" -9 "$zip_name" "$filename" 2>/dev/null
              else
                zip -9 "$zip_name" "$filename" 2>/dev/null
              fi
              
              if [ -f "$zip_name" ] && [ -s "$zip_name" ]; then
                rm -f "$filename"
                
                # Check compressed size
                zip_size=$(stat -c%s "$zip_name")
                zip_size_mb=$((zip_size / 1048576))
                echo "Compressed: $zip_size_mb MB"
                
                if [ "$zip_size" -le 52428800 ]; then
                  # Compressed file fits - send directly
                  send_document "$zip_name" "فایل فشرده: $zip_name" || echo "Failed to send compressed file"
                else
                  # Still too large - split
                  echo "Splitting compressed file..."
                  
                  parts_dir="parts_${base}"
                  mkdir -p "$parts_dir"
                  mv "$zip_name" "$parts_dir/"
                  cd "$parts_dir"
                  
                  split -b 45000000 -d "$zip_name" "part_"
                  
                  if [ $? -eq 0 ] && [ -f "part_00" ]; then
                    rm -f "$zip_name"
                    
                    part_num=1
                    for part in part_*; do
                      if [ -f "$part" ]; then
                        new_name=$(printf "%s.zip.%03d" "$base" $part_num)
                        mv "$part" "$new_name"
                        
                        echo "Sending part $part_num: $new_name"
                        send_document "$new_name" "بخش $part_num - $base" || echo "Failed to send part $part_num"
                        
                        part_num=$((part_num + 1))
                      fi
                    done
                    
                    total_parts=$((part_num - 1))
                    send_message "فایل به $total_parts بخش تقسیم شد" || true
                  fi
                  
                  cd "$TEMP_DIR"
                fi
              else
                echo "Compression failed, trying to send original file..."
                send_document "$filename" "فایل اصلی: $filename" || echo "Failed to send file"
              fi
            fi
            
            echo "Completed: $filename"
            
          done < urls.txt
          
          # Send completion message
          password_info=""
          if [ -n "$PASSWORD" ]; then
            password_info="رمز فایل: $PASSWORD"
          fi
          
          send_message "عملیات دانلود به پایان رسید. $password_info" || true
          
          # Cleanup
          cd /
          rm -rf "$TEMP_DIR"
          
          echo ""
          echo "=============================="
          echo "All done!"
          echo "=============================="
          
      - name: Check Status
        if: always()
        run: |
          echo "Workflow finished"
          echo "If bot is blocked, unblock it first then re-run"
