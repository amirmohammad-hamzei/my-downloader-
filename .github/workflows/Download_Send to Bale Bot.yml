name: Download Manager - Send to Bale Bot

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'دانلود لینک (هر خط یک لینک)'
        required: true
        type: string
      password:
        description: 'رمز فایل ZIP (اختیاری)'
        required: false
        default: ''
        type: string
      chat_id:
        description: 'Chat ID ربات بله'
        required: true
        type: string
      bot_token:
        description: 'توکن ربات بله'
        required: true
        type: string

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 zip unzip curl

      - name: Download and Send to Bale Bot
        env:
          URLS: ${{ github.event.inputs.urls }}
          PASSWORD: ${{ github.event.inputs.password }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          BALE_BOT_TOKEN: ${{ github.event.inputs.bot_token }}
        run: |
          # Create temp directory
          TEMP_DIR=$(mktemp -d)
          cd "$TEMP_DIR" || exit 1
          
          echo "Temp directory: $TEMP_DIR"
          echo "Chat ID: $CHAT_ID"
          echo "Bot Token: ${BALE_BOT_TOKEN:0:10}..."
          
          # Function to send message
          send_msg() {
            local text="$1"
            echo "Sending message: $text"
            local response=$(curl -s -w "\n%{http_code}" -X POST "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendMessage" \
              -F "chat_id=${CHAT_ID}" \
              -F "text=${text}")
            echo "Message API Response: $response"
          }
          
          # Function to send document  
          send_document() {
            local file_path="$1"
            local caption="$2"
            
            if [ ! -f "$file_path" ]; then
              echo "ERROR: File not found: $file_path"
              return 1
            fi
            
            local file_size=$(stat -c%s "$file_path")
            local file_name=$(basename "$file_path")
            
            echo "========================================="
            echo "Sending document: $file_name"
            echo "File path: $file_path"
            echo "File size: $file_size bytes ($((file_size / 1024 / 1024)) MB)"
            echo "Caption: $caption"
            echo "========================================="
            
            # Try sending with verbose output
            local response=$(curl -v -X POST "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendDocument" \
              -F "chat_id=${CHAT_ID}" \
              -F "document=@${file_path};filename=${file_name}" \
              -F "caption=${caption}" 2>&1)
            
            echo "Full response:"
            echo "$response"
            echo "========================================="
            
            # Check if successful
            if echo "$response" | grep -q '"ok":true'; then
              echo "✓ File sent successfully!"
              return 0
            elif echo "$response" | grep -q '"ok":false'; then
              echo "✗ API Error:"
              echo "$response" | grep -o '"description":"[^"]*"'
              return 1
            else
              echo "✗ Unknown error"
              return 1
            fi
          }
          
          # Test: Create and send a small test file first
          echo "Creating test file..."
          echo "This is a test file from GitHub Actions" > test.txt
          echo "Date: $(date)" >> test.txt
          
          echo "Testing file send..."
          send_document "test.txt" "Test file from GitHub Actions"
          
          echo ""
          echo "Now processing URLs..."
          send_msg "🚀 شروع دانلود و ارسال فایل‌ها..."
          
          # Save URLs
          echo "$URLS" > urls.txt
          
          count=0
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            count=$((count + 1))
            
            echo ""
            echo "========================================="
            echo "Processing URL $count: $url"
            
            # Get filename
            filename=$(basename "$url" | cut -d'?' -f1 | cut -d'#' -f1 | sed 's/%20/_/g')
            [ -z "$filename" ] && filename="file_${count}.bin"
            
            echo "Target filename: $filename"
            send_msg "📥 [$count] دانلود: $filename"
            
            # Download
            echo "Downloading..."
            if ! aria2c -x4 -s4 --max-tries=5 --timeout=120 --dir="." --out="$filename" "$url" 2>&1; then
              echo "aria2c failed, trying wget..."
              if ! wget -v --tries=5 --timeout=60 -U "Mozilla/5.0" -O "$filename" "$url" 2>&1; then
                echo "wget failed, trying curl..."
                if ! curl -L -v --retry 5 --connect-timeout 30 -A "Mozilla/5.0" -o "$filename" "$url" 2>&1; then
                  echo "All methods failed!"
                  send_msg "❌ خطا در دانلود $filename"
                  continue
                fi
              fi
            fi
            
            # Check if file exists
            if [ ! -f "$filename" ]; then
              echo "ERROR: File not created: $filename"
              continue
            fi
            
            size=$(stat -c%s "$filename")
            size_mb=$((size / 1048576))
            echo "Downloaded: $filename ($size_mb MB)"
            
            send_msg "✅ دانلود شد: $filename (${size_mb}MB)"
            
            # Send directly if <= 50MB
            if [ "$size" -le 52428800 ]; then
              echo "Sending file directly..."
              send_document "$filename" "$filename"
            else
              # For large files, split first
              echo "File too large, splitting..."
              
              base="${filename%.*}"
              ext="${filename##*.}"
              
              # Create zip if not already
              if [ "$ext" != "zip" ]; then
                zipfile="${base}.zip"
                echo "Creating zip: $zipfile"
                
                if [ -n "$PASSWORD" ]; then
                  zip -P "$PASSWORD" "$zipfile" "$filename"
                else
                  zip "$zipfile" "$filename"
                fi
                
                if [ -f "$zipfile" ]; then
                  rm "$filename"
                  filename="$zipfile"
                fi
              fi
              
              # Split into 45MB parts
              echo "Splitting $filename..."
              split_prefix="${base}_part_"
              split -b 45M -d "$filename" "$split_prefix"
              
              if [ $? -eq 0 ]; then
                rm "$filename"
                
                part=1
                for partfile in ${split_prefix}*; do
                  if [ -f "$partfile" ]; then
                    newname=$(printf "%s.%03d" "$base" $part)
                    mv "$partfile" "$newname"
                    
                    part_size=$(stat -c%s "$newname")
                    echo "Sending part $part: $newname ($((part_size / 1024 / 1024)) MB)"
                    
                    send_document "$newname" "📦 ${base} - بخش ${part}"
                    part=$((part + 1))
                  fi
                done
                
                total=$((part - 1))
                send_msg "📋 فایل به ${total} بخش تقسیم و ارسال شد"
              fi
            fi
            
            echo "Completed: $filename"
            
          done < urls.txt
          
          send_msg "✅ عملیات به پایان رسید"
          if [ -n "$PASSWORD" ]; then
            send_msg "🔐 رمز: ${PASSWORD}"
          fi
          
          # Keep files for debugging
          echo ""
          echo "Files in temp directory:"
          ls -lah "$TEMP_DIR"
          
          echo "Done!"
