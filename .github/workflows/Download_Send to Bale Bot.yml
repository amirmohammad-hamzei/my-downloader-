name: Download Manager - Send to Bale Bot

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'دانلود لینک (هر خط یک لینک)'
        required: true
        type: string
      password:
        description: 'رمز فایل ZIP (اختیاری)'
        required: false
        default: ''
        type: string
      chat_id:
        description: 'Chat ID ربات بله'
        required: true
        type: string
      bot_token:
        description: 'توکن ربات بله'
        required: true
        type: string

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 zip unzip curl jq

      - name: Download and Send to Bale Bot
        env:
          URLS: ${{ github.event.inputs.urls }}
          PASSWORD: ${{ github.event.inputs.password }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          BALE_BOT_TOKEN: ${{ github.event.inputs.bot_token }}
        run: |
          set -e  # Exit on error
          
          # Create temp directory
          TEMP_DIR=$(mktemp -d)
          cd "$TEMP_DIR" || exit 1
          
          echo "Temp directory: $TEMP_DIR"
          echo "Chat ID: $CHAT_ID"
          
          # Function to send message
          send_message() {
            curl -s -X POST "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendMessage" \
              -F "chat_id=${CHAT_ID}" \
              -F "text=$1" || true
          }
          
          # Function to send document
          send_document() {
            local file_path="$1"
            local caption="$2"
            
            echo "Sending file: $file_path"
            
            curl -s -X POST "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendDocument" \
              -F "chat_id=${CHAT_ID}" \
              -F "document=@${file_path}" \
              -F "caption=${caption}" || {
              echo "Failed to send document, trying alternative method..."
              return 1
            }
            return 0
          }
          
          # Send start notification
          send_message "شروع دانلود فایل ها..."
          
          # Process URLs
          echo "$URLS" > urls.txt
          
          count=0
          while IFS= read -r url; do
            # Skip empty lines
            [ -z "$url" ] && continue
            
            count=$((count + 1))
            echo "Processing URL $count: $url"
            
            # Extract filename
            filename=$(basename "$url" | cut -d'?' -f1 | cut -d'#' -f1)
            if [ -z "$filename" ]; then
              filename="download_${count}.bin"
            fi
            
            # Replace spaces and special chars
            filename=$(echo "$filename" | sed 's/%20/_/g' | sed 's/[^a-zA-Z0-9._-]/_/g')
            
            echo "Filename: $filename"
            send_message "شروع دانلود: $filename"
            
            # Download with multiple methods
            downloaded=false
            
            # Method 1: aria2c
            echo "Trying aria2c..."
            aria2c -x4 -s4 --max-tries=3 --timeout=60 \
              --dir="." --out="$filename" "$url" 2>&1 && [ -f "$filename" ] && [ -s "$filename" ] && downloaded=true
            
            # Method 2: wget
            if [ "$downloaded" = false ]; then
              echo "Trying wget..."
              wget --tries=3 --timeout=30 -U "Mozilla/5.0" -O "$filename" "$url" 2>&1 && [ -f "$filename" ] && [ -s "$filename" ] && downloaded=true
            fi
            
            # Method 3: curl
            if [ "$downloaded" = false ]; then
              echo "Trying curl..."
              curl -L --retry 3 --connect-timeout 30 -A "Mozilla/5.0" -o "$filename" "$url" 2>&1 && [ -f "$filename" ] && [ -s "$filename" ] && downloaded=true
            fi
            
            if [ "$downloaded" = false ]; then
              echo "Failed to download: $filename"
              send_message "خطا در دانلود: $filename"
              continue
            fi
            
            # Get file size
            size=$(stat -c%s "$filename" 2>/dev/null || echo 0)
            size_mb=$((size / 1048576))
            echo "Downloaded: $size_mb MB"
            
            send_message "دانلود شد: $filename ($size_mb MB)"
            
            # Send file if under 50MB
            if [ "$size" -le 52428800 ]; then
              echo "Sending file directly..."
              send_document "$filename" "فایل: $filename"
            else
              echo "File too large, creating ZIP parts..."
              
              # Create ZIP
              base="${filename%.*}"
              zip_name="${base}.zip"
              
              if [ -n "$PASSWORD" ]; then
                zip -P "$PASSWORD" "$zip_name" "$filename" 2>/dev/null || true
              else
                zip "$zip_name" "$filename" 2>/dev/null || true
              fi
              
              if [ -f "$zip_name" ] && [ -s "$zip_name" ]; then
                rm -f "$filename"
                
                # Split into parts
                parts_dir="parts_${base}"
                mkdir -p "$parts_dir"
                mv "$zip_name" "$parts_dir/"
                cd "$parts_dir"
                
                split -b 45000000 -d "$zip_name" "part_" || {
                  echo "Split failed, trying to send whole file"
                  cd ..
                  send_document "$parts_dir/$zip_name" "فایل فشرده: $zip_name"
                  continue
                }
                
                rm -f "$zip_name"
                
                # Rename and send parts
                part_num=1
                for part in part_*; do
                  new_name=$(printf "%s.zip.%03d" "$base" $part_num)
                  mv "$part" "$new_name"
                  
                  echo "Sending part $part_num: $new_name"
                  send_document "$new_name" "بخش $part_num - $base"
                  
                  part_num=$((part_num + 1))
                done
                
                # Send join instructions
                total_parts=$((part_num - 1))
                send_message "برای اتصال فایل ها از دستور زیر استفاده کنید: cat ${base}.zip.* > ${base}.zip"
                
                cd ..
              else
                echo "ZIP creation failed"
                send_message "خطا در فشرده سازی فایل"
              fi
            fi
            
            echo "Completed: $filename"
            
          done < urls.txt
          
          # Send completion message
          password_info=""
          if [ -n "$PASSWORD" ]; then
            password_info="رمز فایل: $PASSWORD"
          fi
          
          send_message "عملیات دانلود به پایان رسید. $password_info"
          
          # Cleanup
          cd /
          rm -rf "$TEMP_DIR"
          
          echo "All done!"
          
      - name: Check Status
        if: always()
        run: |
          echo "Workflow finished"
          echo "Check your Bale messages"
