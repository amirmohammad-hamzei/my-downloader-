name: Download Manager - Send to Bale Bot

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'دانلود لینک (هر خط یک لینک)'
        required: true
        type: string
      password:
        description: 'رمز فایل ZIP (اختیاری)'
        required: false
        default: ''
        type: string
      chat_id:
        description: 'Chat ID ربات بله'
        required: true
        type: string
      bot_token:
        description: 'توکن ربات بله'
        required: true
        type: string

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 zip unzip curl

      - name: Download and Send to Bale Bot
        env:
          URLS: ${{ github.event.inputs.urls }}
          PASSWORD: ${{ github.event.inputs.password }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          BALE_BOT_TOKEN: ${{ github.event.inputs.bot_token }}
        run: |
          CHUNK_SIZE=19922944
          
          TEMP_DIR=$(mktemp -d)
          cd "$TEMP_DIR" || exit 1
          
          echo "Temp directory: $TEMP_DIR"
          echo "Chunk size: $((CHUNK_SIZE / 1024 / 1024)) MB"
          
          send_msg() {
            curl -s -X POST "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendMessage" \
              -F "chat_id=${CHAT_ID}" \
              -F "text=$1" > /dev/null 2>&1
          }
          
          send_document() {
            local file_path="$1"
            local caption="$2"
            
            if [ ! -f "$file_path" ]; then
              echo "ERROR: File not found: $file_path"
              return 1
            fi
            
            local file_size=$(stat -c%s "$file_path")
            local file_name=$(basename "$file_path")
            
            echo "Sending: $file_name ($((file_size / 1024 / 1024)) MB)"
            
            local response=$(curl -s -X POST "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendDocument" \
              -F "chat_id=${CHAT_ID}" \
              -F "document=@${file_path}" \
              -F "caption=${caption}")
            
            if echo "$response" | grep -q '"ok":true'; then
              echo "  Sent OK"
              return 0
            else
              local error=$(echo "$response" | grep -o '"description":"[^"]*"')
              echo "  Failed: $error"
              return 1
            fi
          }
          
          send_msg "🚀 شروع دانلود و ارسال فایل‌ها..."
          
          echo "$URLS" > urls.txt
          
          count=0
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            count=$((count + 1))
            
            echo ""
            echo "========================================="
            echo "File $count: $url"
            
            # Get original filename from URL
            filename=$(basename "$url" | cut -d'?' -f1 | cut -d'#' -f1 | sed 's/%20/_/g')
            [ -z "$filename" ] && filename="file_${count}.bin"
            
            echo "Name: $filename"
            send_msg "📥 دانلود: $filename"
            
            echo "Downloading..."
            if ! aria2c -q -x4 -s4 --max-tries=5 --timeout=120 --dir="." --out="$filename" "$url"; then
              if ! wget -q --tries=5 --timeout=60 -U "Mozilla/5.0" -O "$filename" "$url"; then
                if ! curl -s -L --retry 5 --connect-timeout 30 -A "Mozilla/5.0" -o "$filename" "$url"; then
                  echo "Download failed!"
                  send_msg "❌ خطا در دانلود $filename"
                  continue
                fi
              fi
            fi
            
            if [ ! -f "$filename" ] || [ ! -s "$filename" ]; then
              echo "File empty/missing"
              send_msg "❌ فایل خالی است"
              continue
            fi
            
            size=$(stat -c%s "$filename")
            size_mb=$((size / 1048576))
            echo "Size: $size_mb MB"
            send_msg "✅ ${size_mb}MB - $filename"
            
            # Always use .zip extension for consistency
            base=$(echo "$filename" | sed 's/\.[^.]*$//')
            ext=$(echo "${filename##*.}" | tr '[:upper:]' '[:lower:]')
            
            # If not already a zip, convert to zip
            if [ "$ext" != "zip" ]; then
              echo "Converting to ZIP..."
              zipfile="${base}.zip"
              
              if [ -n "$PASSWORD" ]; then
                zip -q -P "$PASSWORD" -9 "$zipfile" "$filename"
              else
                zip -q -9 "$zipfile" "$filename"
              fi
              
              if [ -f "$zipfile" ] && [ -s "$zipfile" ]; then
                rm "$filename"
                filename="$zipfile"
                size=$(stat -c%s "$filename")
                size_mb=$((size / 1048576))
                echo "ZIP created: $size_mb MB"
              else
                echo "ZIP failed - keeping original format"
              fi
            fi
            
            # Split if > 19MB
            if [ "$size" -gt "$CHUNK_SIZE" ]; then
              echo "File > 19MB, splitting..."
              
              splitdir="split_${base}_$$"
              mkdir -p "$splitdir"
              cp "$filename" "$splitdir/"
              cd "$splitdir"
              
              split -b $CHUNK_SIZE -d "$filename" "temp_chunk_"
              
              if [ $? -eq 0 ] && ls temp_chunk_* >/dev/null 2>&1; then
                rm "$filename"
                
                total=$(ls temp_chunk_* | wc -l)
                echo "Split into $total parts"
                
                part=1
                for chunk in temp_chunk_*; do
                  [ ! -f "$chunk" ] && continue
                  
                  # Rename to .zip.001, .zip.002, etc.
                  partname=$(printf "%s.zip.%03d" "$base" $part)
                  mv "$chunk" "$partname"
                  
                  part_size=$(stat -c%s "$partname")
                  echo "Part $part/$total: $partname ($((part_size / 1024 / 1024)) MB)"
                  
                  # Send with retry
                  retry=0
                  while [ $retry -lt 3 ]; do
                    if send_document "$partname" "📦 ${base}.zip - بخش ${part} از ${total}"; then
                      break
                    fi
                    retry=$((retry + 1))
                    echo "  Retry $retry..."
                    sleep 5
                  done
                  
                  part=$((part + 1))
                done
                
                # Instructions for joining
                join_msg="📋 فایل ${base}.zip به ${total} بخش تقسیم شد"
                send_msg "$join_msg"
                
                join_cmd="🔧 روش اتصال فایل‌ها:"
                join_cmd="$join_cmd"$'\n'"Windows: copy /b ${base}.zip.* ${base}.zip"
                join_cmd="$join_cmd"$'\n'"Linux/Mac: cat ${base}.zip.* > ${base}.zip"
                join_cmd="$join_cmd"$'\n'"Android: با ZArchiver اولین فایل رو Extract کن"
                send_msg "$join_cmd"
                
                if [ -n "$PASSWORD" ]; then
                  send_msg "🔐 رمز فایل ZIP: ${PASSWORD}"
                fi
                
              else
                echo "Split failed!"
                send_msg "⚠️ خطا در تقسیم فایل"
              fi
              
              cd "$TEMP_DIR"
              
            else
              # File < 19MB - send directly
              echo "Sending directly..."
              
              # Make sure it has .zip extension
              if [ "$ext" != "zip" ] && [ -f "${base}.zip" ]; then
                filename="${base}.zip"
              fi
              
              if send_document "$filename" "📁 $(basename "$filename")"; then
                echo "Sent successfully!"
              else
                echo "Send failed!"
                send_msg "⚠️ خطا در ارسال $filename"
              fi
            fi
            
          done < urls.txt
          
          # Final messages
          send_msg "✅ عملیات دانلود و ارسال به پایان رسید"
          
          if [ -n "$PASSWORD" ]; then
            send_msg "🔐 رمز همه فایل‌های ZIP: ${PASSWORD}"
          fi
          
          # Cleanup
          cd /
          rm -rf "$TEMP_DIR"
          echo "All done!"
