name: Download Manager - Send to Bale Bot

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'دانلود لینک (هر خط یک لینک)'
        required: true
        type: string
      password:
        description: 'رمز فایل ZIP (اختیاری)'
        required: false
        default: ''
        type: string
      chat_id:
        description: 'Chat ID ربات بله'
        required: true
        type: string
      bot_token:
        description: 'توکن ربات بله'
        required: true
        type: string

jobs:
  download-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 zip unzip curl

      - name: Download and Send to Bale Bot
        env:
          URLS: ${{ github.event.inputs.urls }}
          PASSWORD: ${{ github.event.inputs.password }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          BALE_BOT_TOKEN: ${{ github.event.inputs.bot_token }}
        run: |
          # Create temp directory
          TEMP_DIR=$(mktemp -d)
          cd "$TEMP_DIR" || exit 1
          
          echo "Temp directory: $TEMP_DIR"
          echo "Chat ID: $CHAT_ID"
          
          # Function to send file to Bale
          send_file() {
            local file="$1"
            local caption="$2"
            
            echo "Sending: $file ($(ls -lh "$file" | awk '{print $5}'))"
            
            response=$(curl -s -X POST "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendDocument" \
              -F "chat_id=${CHAT_ID}" \
              -F "document=@${file}" \
              -F "caption=${caption}")
            
            if echo "$response" | grep -q '"ok":true'; then
              echo "  ✓ Sent successfully"
              return 0
            else
              echo "  ✗ Failed: $response"
              return 1
            fi
          }
          
          # Function to send message
          send_msg() {
            curl -s -X POST "https://tapi.bale.ai/bot${BALE_BOT_TOKEN}/sendMessage" \
              -F "chat_id=${CHAT_ID}" \
              -F "text=$1" > /dev/null 2>&1
          }
          
          # Start
          send_msg "🚀 شروع دانلود فایل ها..."
          echo "Started"
          
          # Save URLs
          echo "$URLS" > urls.txt
          
          count=0
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            count=$((count + 1))
            
            echo ""
            echo "=== File $count ==="
            echo "URL: $url"
            
            # Get filename from URL
            filename=$(basename "$url" | cut -d'?' -f1 | cut -d'#' -f1 | sed 's/%20/_/g')
            [ -z "$filename" ] && filename="file_${count}.bin"
            
            echo "Name: $filename"
            send_msg "📥 [$count] دانلود: $filename"
            
            # Download with aria2c
            echo "Downloading..."
            if ! aria2c -x4 -s4 --max-tries=5 --timeout=120 --dir="." --out="$filename" "$url"; then
              echo "aria2c failed, trying wget..."
              if ! wget -q --tries=5 --timeout=60 -U "Mozilla/5.0" -O "$filename" "$url"; then
                echo "wget failed, trying curl..."
                if ! curl -L --retry 5 --connect-timeout 30 -A "Mozilla/5.0" -o "$filename" "$url"; then
                  echo "All methods failed!"
                  send_msg "❌ خطا در دانلود $filename"
                  continue
                fi
              fi
            fi
            
            # Check download
            if [ ! -f "$filename" ] || [ ! -s "$filename" ]; then
              echo "Download failed - file empty or missing"
              send_msg "❌ فایل خالی است: $filename"
              continue
            fi
            
            # Get size
            size=$(stat -c%s "$filename")
            size_mb=$((size / 1048576))
            echo "Size: $size_mb MB"
            send_msg "✅ دانلود شد: $filename (${size_mb}MB)"
            
            # If file is 50MB or less, send directly
            if [ "$size" -le 52428800 ]; then
              echo "Sending directly (under 50MB)..."
              send_file "$filename" "📁 $filename" || send_msg "⚠️ خطا در ارسال فایل"
              continue
            fi
            
            # For files > 50MB, create parts
            echo "File > 50MB, splitting..."
            
            base=$(echo "$filename" | sed 's/\.[^.]*$//')
            ext=$(echo "$filename" | awk -F. '{print tolower($NF)}')
            
            # If not zip, compress it first
            if [ "$ext" != "zip" ]; then
              echo "Compressing to ZIP..."
              zipfile="${base}.zip"
              
              if [ -n "$PASSWORD" ]; then
                zip -P "$PASSWORD" -9 "$zipfile" "$filename"
              else
                zip -9 "$zipfile" "$filename"
              fi
              
              if [ -f "$zipfile" ] && [ -s "$zipfile" ]; then
                echo "Compressed: $(ls -lh "$zipfile" | awk '{print $5}')"
                rm -f "$filename"
                filename="$zipfile"
              else
                echo "Compression failed!"
                send_msg "⚠️ خطا در فشرده‌سازی"
                continue
              fi
            fi
            
            # Now split the zip file
            partdir="split_${base}_$$"
            mkdir -p "$partdir"
            
            echo "Splitting $filename..."
            cp "$filename" "$partdir/"
            cd "$partdir"
            
            # Use split command
            split -b 45M -d "$filename" "${base}.part"
            
            if [ ! -f "${base}.part00" ]; then
              echo "Split failed!"
              cd ..
              send_msg "⚠️ خطا در تقسیم فایل"
              continue
            fi
            
            # Remove original zip from parts dir
            rm -f "$filename"
            
            # Rename parts with proper names
            part_num=1
            for part in ${base}.part*; do
              [ ! -f "$part" ] && continue
              
              newname=$(printf "%s.zip.%03d" "$base" $part_num)
              mv "$part" "$newname"
              
              echo "Part $part_num: $newname ($(ls -lh "$newname" | awk '{print $5}'))"
              
              # Send this part
              if send_file "$newname" "📦 ${base} - بخش ${part_num}"; then
                echo "  Part $part_num sent"
              else
                echo "  Failed to send part $part_num"
              fi
              
              part_num=$((part_num + 1))
            done
            
            total=$((part_num - 1))
            echo "Total parts: $total"
            
            # Send join instructions
            msg="📋 فایل ${base} به ${total} بخش تقسیم شد"
            msg="${msg}"$'\n'"⚠️ برای استفاده:"
            msg="${msg}"$'\n'"۱. همه فایل‌ها را دانلود کنید"
            msg="${msg}"$'\n'"۲. در یک پوشه قرار دهید"
            msg="${msg}"$'\n'"۳. با دستور زیر متصل کنید:"
            msg="${msg}"$'\n'"cat ${base}.zip.* > ${base}.zip"
            msg="${msg}"$'\n'"۴. فایل ${base}.zip را Extract کنید"
            send_msg "$msg"
            
            if [ -n "$PASSWORD" ]; then
              send_msg "🔐 رمز فایل: ${PASSWORD}"
            fi
            
            cd "$TEMP_DIR"
            
          done < urls.txt
          
          # Done
          if [ -n "$PASSWORD" ]; then
            send_msg "✅ تمام شد! 🔐 رمز: ${PASSWORD}"
          else
            send_msg "✅ تمام شد!"
          fi
          
          # Cleanup
          cd /
          rm -rf "$TEMP_DIR"
          echo "Done!"
